<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Utilmint Unit Converter</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="topbar">
  <div class="brand">Utilmint</div>

  <nav class="nav">
    <a href="#converter">Converter</a>
    <a href="#categories">Categories</a>
    <a href="#tools">Tools</a>
  </nav>

  <button id="themeBtn">🌓</button>
</header>

<main class="container">

<!-- CONVERTER -->
<section id="converter" class="panel">

  <div class="converter">

    <div class="input-box">
      <input id="value" type="number" placeholder="Enter value"/>
    </div>

    <div class="select-grid">
      <select id="category"></select>
      <select id="from"></select>
      <select id="to"></select>
    </div>

    <div class="actions">
      <button id="swap">Swap</button>
      <button id="copy">Copy</button>
    </div>

    <div class="output">
      <h2 id="result">0</h2>
    </div>

  </div>

</section>

<!-- CATEGORIES -->
<section id="categories" class="panel">
  <h2>25 Conversion Categories</h2>

  <div class="grid" id="categoryGrid"></div>
</section>

<!-- TOOLS -->
<section id="tools" class="panel">
  <h2>Power Tools</h2>

  <div class="tools">
    <div>✔ History (localStorage)</div>
    <div>✔ Favorites system</div>
    <div>✔ Swap engine</div>
    <div>✔ Real-time conversion</div>
  </div>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
