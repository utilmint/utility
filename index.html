<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Utilmint Pro - Advanced Converter Suite</title>

<style>
/* =========================
   UTILMINT GLOBAL STYLES
========================= */

:root{
    --bg:#0f172a;
    --panel:#111827;
    --btn:#1f2937;
    --accent:#38bdf8;
    --text:#ffffff;
}

body.light{
    --bg:#f1f5f9;
    --panel:#ffffff;
    --btn:#e2e8f0;
    --text:#000000;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

/* HEADER */
header{
    padding:18px;
    background:var(--panel);
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
}

/* BUTTON GRID */
.grid{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    padding:20px;
}

button{
    padding:10px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:var(--btn);
    color:var(--text);
    transition:0.2s;
}

button:hover{
    background:var(--accent);
    color:black;
}

/* CONVERTER PANEL */
.panel{
    max-width:520px;
    margin:20px auto;
    background:var(--panel);
    padding:20px;
    border-radius:10px;
    display:none;
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:none;
}

.result{
    margin-top:10px;
    font-size:18px;
    color:var(--accent);
}

/* HISTORY BOX */
.history{
    max-width:520px;
    margin:20px auto;
    background:var(--panel);
    padding:10px;
    border-radius:10px;
    font-size:14px;
}

/* SMALL TEXT */
.small{
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<header>UTILMINT PRO - Advanced Unit Converter Suite</header>

<div class="topbar">
<button onclick="toggleTheme()">Toggle Theme</button>
<button onclick="clearHistory()">Clear History</button>
</div>

<!-- ================= BUTTON GRID ================= -->
<div class="grid">

<button onclick="openPanel('length')">Length</button>
<button onclick="openPanel('mass')">Mass</button>
<button onclick="openPanel('time')">Time</button>
<button onclick="openPanel('temperature')">Temperature</button>
<button onclick="openPanel('area')">Area</button>
<button onclick="openPanel('volume')">Volume</button>
<button onclick="openPanel('speed')">Speed</button>
<button onclick="openPanel('acceleration')">Acceleration</button>
<button onclick="openPanel('force')">Force</button>
<button onclick="openPanel('pressure')">Pressure</button>
<button onclick="openPanel('energy')">Energy</button>
<button onclick="openPanel('power')">Power</button>
<button onclick="openPanel('data')">Data</button>
<button onclick="openPanel('frequency')">Frequency</button>
<button onclick="openPanel('angle')">Angle</button>
<button onclick="openPanel('fuel')">Fuel</button>
<button onclick="openPanel('density')">Density</button>
<button onclick="openPanel('torque')">Torque</button>
<button onclick="openPanel('current')">Current</button>
<button onclick="openPanel('voltage')">Voltage</button>
<button onclick="openPanel('resistance')">Resistance</button>
<button onclick="openPanel('charge')">Charge</button>
<button onclick="openPanel('capacitance')">Capacitance</button>
<button onclick="openPanel('magnetic')">Magnetic</button>
<button onclick="openPanel('light')">Luminous</button>

</div>

<!-- ================= CONVERTER PANEL ================= -->
<div class="panel" id="panel">

<h3 id="title">Converter</h3>

<input type="number" id="value" placeholder="Enter value">

<select id="from"></select>
<select id="to"></select>

<button onclick="convert()">Convert</button>

<div class="result" id="result"></div>

<div class="small">Utilmint Pro Engine v2.0</div>
</div>

<!-- ================= HISTORY ================= -->
<div class="history" id="historyBox">
<h4>Conversion History</h4>
<div id="history"></div>
</div>

<script>

/* =========================
   UTILMINT CONVERSION ENGINE
========================= */

const U = {
length:{m:1,km:1000,cm:0.01,mm:0.001,mile:1609.34},
mass:{kg:1,g:0.001,mg:0.000001,lb:0.453592},
time:{s:1,min:60,hr:3600},
area:{m2:1,km2:1e6,cm2:0.0001},
volume:{m3:1,l:0.001,ml:0.000001},
speed:{"m/s":1,"km/h":0.277778},
acceleration:{"m/s2":1},
force:{N:1,kN:1000},
pressure:{Pa:1,kPa:1000,bar:100000},
energy:{J:1,kJ:1000,kcal:4184},
power:{W:1,kW:1000},
data:{B:1,KB:1024,MB:1048576,GB:1073741824},
frequency:{Hz:1,kHz:1000,MHz:1e6},
angle:{rad:1,deg:0.0174533},
fuel:{"km/l":1},
density:{"kg/m3":1},
torque:{"N·m":1},
current:{A:1,mA:0.001},
voltage:{V:1,mV:0.001},
resistance:{ohm:1,kohm:1000},
charge:{C:1,mC:0.001},
capacitance:{F:1,uF:1e-6},
magnetic:{T:1},
light:{cd:1}
};

let current="";
let historyList=[];

/* =========================
   OPEN PANEL
========================= */

function openPanel(type){

current=type;

document.getElementById("panel").style.display="block";
document.getElementById("title").innerText=type.toUpperCase();

let from=document.getElementById("from");
let to=document.getElementById("to");

from.innerHTML="";
to.innerHTML="";

for(let x in U[type]){
from.innerHTML+=`<option>${x}</option>`;
to.innerHTML+=`<option>${x}</option>`;
}

}

/* =========================
   CONVERT FUNCTION
========================= */

function convert(){

let val=parseFloat(document.getElementById("value").value);
if(isNaN(val)) return;

let f=document.getElementById("from").value;
let t=document.getElementById("to").value;

let res=0;

/* base conversion */
res = val * U[current][f] / U[current][t];

/* temperature logic */
if(current==="temperature"){
if(f==="C"&&t==="F") res=(val*9/5)+32;
if(f==="F"&&t==="C") res=(val-32)*5/9;
if(f==="C"&&t==="K") res=val+273.15;
if(f==="K"&&t==="C") res=val-273.15;
}

/* show result */
document.getElementById("result").innerText="Result: "+res;

/* history */
historyList.push(`${val} ${f} → ${res} ${t}`);
updateHistory();

}

/* =========================
   HISTORY SYSTEM
========================= */

function updateHistory(){
document.getElementById("history").innerHTML=
historyList.slice(-10).map(h=>"• "+h).join("<br>");
}

function clearHistory(){
historyList=[];
updateHistory();
}

/* =========================
   THEME TOGGLE
========================= */

function toggleTheme(){
document.body.classList.toggle("light");
}

</script>

</body>
</html>
