<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FormulaHub</title>

<!-- MathJax for formulas -->
<script>
window.MathJax = {
  tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
  svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/lucide-static/font/lucide.css" rel="stylesheet">

<style>
/* =========================
   ROOT THEME
========================= */
:root {
  --bg: #0b0f1a;
  --card: rgba(255,255,255,0.06);
  --text: #ffffff;
  --muted: #a9b0c0;
  --primary: #7c3aed;
  --secondary: #06b6d4;
  --accent: #22c55e;
}

.light {
  --bg: #f6f7fb;
  --card: rgba(0,0,0,0.05);
  --text: #0b0f1a;
  --muted: #4b5563;
}

/* =========================
   GLOBAL
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  background: radial-gradient(circle at top, #111827, var(--bg));
  color: var(--text);
  min-height: 100vh;
  transition: 0.4s;
}

a { color: inherit; text-decoration: none; }

/* =========================
   NAVBAR
========================= */
.navbar {
  position: sticky;
  top: 0;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.3);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  z-index: 1000;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-links {
  display: flex;
  gap: 18px;
}

.nav-links a {
  opacity: 0.8;
  transition: 0.3s;
}

.nav-links a:hover {
  opacity: 1;
}

/* =========================
   HERO
========================= */
.hero {
  padding: 80px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 12px;
}

.hero p {
  color: var(--muted);
  margin-bottom: 20px;
}

/* Search Bar */
.search-box {
  max-width: 600px;
  margin: auto;
  display: flex;
  background: var(--card);
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
}

.search-box input {
  flex: 1;
  padding: 14px;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
}

.search-box button {
  padding: 0 20px;
  border: none;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  color: white;
  cursor: pointer;
}

/* =========================
   CARDS GRID
========================= */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 18px;
  padding: 40px 20px;
}

.card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 18px;
  backdrop-filter: blur(12px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--primary);
}

/* =========================
   BUTTON
========================= */
.btn {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  color: white;
}

/* =========================
   FOOTER
========================= */
footer {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  border-top: 1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">FormulaHub</div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Categories</a>
    <a href="#">Converters</a>
    <a href="#">About</a>
  </div>

  <button class="btn" onclick="toggleTheme()">Theme</button>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Learn Formulas Smarter</h1>
  <p>Physics • Math • Chemistry • Finance • Converters</p>

  <div class="search-box">
    <input id="searchInput" placeholder="Search formulas, calculators..." />
    <button onclick="search()">Search</button>
  </div>
</section>

<!-- CATEGORY GRID -->
<section class="grid" id="categoryGrid"></section>

<!-- FOOTER -->
<footer>
  © 2026 FormulaHub • Built with HTML, CSS & JS
</footer>

<script>
/* =========================
   MOCK DATA
========================= */
const categories = [
  { name: "Mathematics", icon: "∑", color: "#7c3aed" },
  { name: "Physics", icon: "⚡", color: "#06b6d4" },
  { name: "Chemistry", icon: "⚗️", color: "#22c55e" },
  { name: "Biology", icon: "🧬", color: "#f59e0b" },
  { name: "Finance", icon: "💰", color: "#ef4444" }
];

/* =========================
   RENDER CATEGORIES
========================= */
const grid = document.getElementById("categoryGrid");

function renderCategories() {
  grid.innerHTML = categories.map(c => `
    <div class="card">
      <h2>${c.icon} ${c.name}</h2>
      <p style="color:var(--muted)">Explore formulas in ${c.name}</p>
      <button class="btn">Open</button>
    </div>
  `).join("");
}

renderCategories();

/* =========================
   THEME TOGGLE
========================= */
function toggleTheme() {
  document.body.classList.toggle("light");
}

/* =========================
   SEARCH (basic mock)
========================= */
function search() {
  const val = document.getElementById("searchInput").value;
  alert("Searching: " + val);
}
</script>

 <script>
/* =========================
   FORMULA DATABASE (MOCK)
========================= */

const formulas = [
  {
    id: 1,
    title: "Quadratic Formula",
    category: "Mathematics",
    formula: "x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}",
    desc: "Solves quadratic equations",
    tags: ["algebra", "roots"]
  },
  {
    id: 2,
    title: "Pythagorean Theorem",
    category: "Mathematics",
    formula: "a^2 + b^2 = c^2",
    desc: "Relation in right triangle",
    tags: ["geometry"]
  },
  {
    id: 3,
    title: "Simple Interest",
    category: "Finance",
    formula: "SI = \\frac{P \\times R \\times T}{100}",
    desc: "Basic interest calculation",
    tags: ["money"]
  },
  {
    id: 4,
    title: "Newton's Second Law",
    category: "Physics",
    formula: "F = ma",
    desc: "Force equals mass × acceleration",
    tags: ["motion"]
  },
  {
    id: 5,
    title: "Speed Formula",
    category: "Physics",
    formula: "Speed = \\frac{Distance}{Time}",
    desc: "Basic motion formula",
    tags: ["motion"]
  },
  {
    id: 6,
    title: "Area of Circle",
    category: "Mathematics",
    formula: "A = \\pi r^2",
    desc: "Circle area calculation",
    tags: ["geometry"]
  }
];

/* =========================
   TRENDING FORMULAS
========================= */

const trending = [1, 2, 4, 6];

/* =========================
   RENDER FORMULA CARD
========================= */

function formulaCard(f) {
  return `
    <div class="card">
      <h3>${f.title}</h3>
      <p style="color:var(--muted)">${f.desc}</p>

      <div style="margin:10px 0">
        \\(${f.formula}\\)
      </div>

      <small style="color:var(--muted)">
        Category: ${f.category}
      </small>

      <br/><br/>
      <button class="btn" onclick="openFormula(${f.id})">
        View Details
      </button>
    </div>
  `;
}

/* =========================
   RENDER TRENDING
========================= */

function renderTrending() {
  const container = document.createElement("div");
  container.className = "grid";

  const items = formulas.filter(f => trending.includes(f.id));

  container.innerHTML = `
    <div style="grid-column:1/-1">
      <h2 style="padding:0 20px">🔥 Trending Formulas</h2>
    </div>
    ${items.map(formulaCard).join("")}
  `;

  document.body.appendChild(container);
}

/* =========================
   SEARCH ENGINE (LIVE FILTER)
========================= */

function searchFormulas(query) {
  query = query.toLowerCase();

  return formulas.filter(f =>
    f.title.toLowerCase().includes(query) ||
    f.category.toLowerCase().includes(query) ||
    f.tags.some(t => t.includes(query))
  );
}

/* =========================
   RENDER SEARCH RESULTS
========================= */

function renderSearchResults(query) {
  const results = searchFormulas(query);

  let old = document.getElementById("results");
  if (old) old.remove();

  const container = document.createElement("div");
  container.id = "results";
  container.className = "grid";

  container.innerHTML = `
    <div style="grid-column:1/-1">
      <h2 style="padding:0 20px">Search Results</h2>
    </div>

    ${
      results.length
        ? results.map(formulaCard).join("")
        : `<div class="card">No formulas found</div>`
    }
  `;

  document.body.appendChild(container);

  setTimeout(() => {
    if (window.MathJax) MathJax.typeset();
  }, 200);
}

/* =========================
   OPEN FORMULA (MOCK PAGE)
========================= */

function openFormula(id) {
  const f = formulas.find(x => x.id === id);
  alert("Opening: " + f.title);
}

/* =========================
   OVERRIDE SEARCH BUTTON
========================= */

function search() {
  const val = document.getElementById("searchInput").value;
  renderSearchResults(val);
}

/* =========================
   INIT
========================= */

renderTrending();

/* re-render math */
setTimeout(() => {
  if (window.MathJax) MathJax.typeset();
}, 500);

</script>
  
</body>
</html>
