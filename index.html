<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Utilmint Unit Converter</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="header">
  <div class="logo">Utilmint</div>

  <nav class="nav">
    <a href="#converter">Converter</a>
    <a href="#categories">Categories</a>
    <a href="#tools">Tools</a>
  </nav>

  <button id="themeToggle" class="btn">Theme</button>
</header>

<main class="main">

<!-- CONVERTER -->
<section id="converter" class="card converter">

  <h1>Unit Converter</h1>

  <input id="input" type="number" placeholder="Enter value" />

  <select id="category"></select>

  <div class="row">
    <select id="from"></select>
    <button id="swap">⇄</button>
    <select id="to"></select>
  </div>

  <div class="result">
    <span id="output">0</span>
    <button id="copy">Copy</button>
  </div>

</section>

<!-- CATEGORIES -->
<section id="categories" class="section">
  <h2>All Categories</h2>
  <div class="grid" id="grid"></div>
</section>

<!-- TOOLS -->
<section id="tools" class="section">
  <h2>Tools</h2>

  <div class="tools">
    <div>✔ Real-time conversion</div>
    <div>✔ Swap system</div>
    <div>✔ 25 categories</div>
    <div>✔ Dark mode</div>
  </div>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
