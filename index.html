<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Utilmint Pro</title>

<style>
/* =========================
   UTILMINT PRO STYLES
========================= */

:root{
  --bg:#0f172a;
  --panel:#111827;
  --btn:#1f2937;
  --text:#fff;
  --accent:#38bdf8;
}

body.light{
  --bg:#f1f5f9;
  --panel:#ffffff;
  --btn:#e2e8f0;
  --text:#000;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header{
  text-align:center;
  padding:18px;
  background:var(--panel);
  font-size:22px;
  font-weight:bold;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--btn);
  color:var(--text);
}

button:hover{
  background:var(--accent);
  color:black;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  padding:20px;
}

.panel{
  max-width:520px;
  margin:auto;
  background:var(--panel);
  padding:20px;
  border-radius:10px;
  display:none;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

.result{
  margin-top:10px;
  color:var(--accent);
  font-size:18px;
}

.history{
  max-width:520px;
  margin:20px auto;
  background:var(--panel);
  padding:10px;
  border-radius:10px;
  font-size:13px;
}
</style>

</head>
<body>

<header>UTILMINT PRO - All-in-One Converter</header>

<div class="topbar">
<button onclick="toggleTheme()">Theme</button>
<button onclick="clearHistory()">Clear History</button>
</div>

<!-- ================= BUTTONS ================= -->
<div class="grid">

<button onclick="openBox('length')">Length</button>
<button onclick="openBox('mass')">Mass</button>
<button onclick="openBox('time')">Time</button>
<button onclick="openBox('temperature')">Temperature</button>
<button onclick="openBox('area')">Area</button>
<button onclick="openBox('volume')">Volume</button>
<button onclick="openBox('speed')">Speed</button>
<button onclick="openBox('acceleration')">Acceleration</button>
<button onclick="openBox('force')">Force</button>
<button onclick="openBox('pressure')">Pressure</button>
<button onclick="openBox('energy')">Energy</button>
<button onclick="openBox('power')">Power</button>
<button onclick="openBox('data')">Data</button>
<button onclick="openBox('frequency')">Frequency</button>
<button onclick="openBox('angle')">Angle</button>
<button onclick="openBox('fuel')">Fuel</button>
<button onclick="openBox('density')">Density</button>
<button onclick="openBox('torque')">Torque</button>
<button onclick="openBox('current')">Current</button>
<button onclick="openBox('voltage')">Voltage</button>
<button onclick="openBox('resistance')">Resistance</button>
<button onclick="openBox('charge')">Charge</button>
<button onclick="openBox('capacitance')">Capacitance</button>
<button onclick="openBox('magnetic')">Magnetic</button>
<button onclick="openBox('light')">Luminous</button>

</div>

<!-- ================= PANEL ================= -->
<div class="panel" id="panel">

<h3 id="title"></h3>

<input id="input" type="number" placeholder="Enter value">

<select id="from"></select>
<select id="to"></select>

<button onclick="convert()">Convert</button>

<div class="result" id="result"></div>

</div>

<!-- ================= HISTORY ================= -->
<div class="history" id="historyBox">
<h4>History</h4>
<div id="history"></div>
</div>

<script>

/* =========================
   UNIT DATABASE
========================= */

const U = {

length:{m:1,km:1000,cm:0.01,mm:0.001,mile:1609.34},
mass:{kg:1,g:0.001,mg:0.000001,lb:0.453592},
time:{s:1,min:60,hr:3600},
area:{m2:1,km2:1e6},
volume:{m3:1,l:0.001,ml:0.000001},
speed:{"m/s":1,"km/h":0.277778},
acceleration:{"m/s2":1},
force:{N:1,kN:1000},
pressure:{Pa:1,kPa:1000,bar:100000},
energy:{J:1,kJ:1000,kcal:4184},
power:{W:1,kW:1000},
data:{B:1,KB:1024,MB:1048576,GB:1073741824},
frequency:{Hz:1,kHz:1000,MHz:1e6},
angle:{rad:1,deg:0.0174533},
fuel:{"km/l":1},
density:{"kg/m3":1},
torque:{"N·m":1},
current:{A:1,mA:0.001},
voltage:{V:1,mV:0.001},
resistance:{ohm:1,kohm:1000},
charge:{C:1,mC:0.001},
capacitance:{F:1,uF:1e-6},
magnetic:{T:1},
light:{cd:1}

};

let current="";
let history=[];

/* =========================
   OPEN BOX
========================= */

function openBox(type){

current=type;

document.getElementById("panel").style.display="block";
document.getElementById("title").innerText=type.toUpperCase();

let f=document.getElementById("from");
let t=document.getElementById("to");

f.innerHTML="";
t.innerHTML="";

for(let x in U[type]){
f.innerHTML+=`<option>${x}</option>`;
t.innerHTML+=`<option>${x}</option>`;
}

}

/* =========================
   CONVERT ENGINE
========================= */

function convert(){

let val=parseFloat(document.getElementById("input").value);
if(isNaN(val)) return;

let f=document.getElementById("from").value;
let t=document.getElementById("to").value;

let res=val * U[current][f] / U[current][t];

/* temperature fix */
if(current==="temperature"){
if(f==="C"&&t==="F") res=(val*9/5)+32;
if(f==="F"&&t==="C") res=(val-32)*5/9;
if(f==="C"&&t==="K") res=val+273.15;
if(f==="K"&&t==="C") res=val-273.15;
}

document.getElementById("result").innerText="Result: "+res;

history.push(`${val} ${f} → ${res} ${t}`);
updateHistory();

}

/* =========================
   HISTORY
========================= */

function updateHistory(){
document.getElementById("history").innerHTML =
history.slice(-15).map(h=>"• "+h).join("<br>");
}

function clearHistory(){
history=[];
updateHistory();
}

/* =========================
   THEME
========================= */

function toggleTheme(){
document.body.classList.toggle("light");
}

</script>

</body>
</html>
