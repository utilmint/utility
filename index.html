<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utilmint - Smart Unit Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar" id="navbar">
    <div class="nav-container">

      <!-- Logo -->
      <div class="logo">
        Utilmint
      </div>

      <!-- Hamburger (Mobile) -->
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- Navigation Links -->
      <nav class="nav-menu" id="nav-menu">
        <a href="#home" class="nav-link">Home</a>
        <a href="#converter" class="nav-link">Unit Converter</a>
        <a href="#categories" class="nav-link">Categories</a>
        <a href="#favorites" class="nav-link">Favorites</a>
        <a href="#blog" class="nav-link">Blog / Learn</a>
      </nav>

      <!-- CTA Button -->
      <div class="nav-cta">
        <button class="cta-btn">Start Converting</button>
      </div>

    </div>
  </header>

  <!-- Dummy Sections for Scroll -->
  <section id="home" class="section"></section>
  <section id="converter" class="section"></section>
  <section id="categories" class="section"></section>
  <section id="favorites" class="section"></section>
  <section id="blog" class="section"></section>

  <script src="script.js"></script>

    <!-- HERO SECTION -->
  <section class="hero">

    <div class="hero-content">

      <!-- HEADLINE -->
      <h1 class="hero-title">Instant Unit Conversions, Anytime.</h1>

      <!-- SUBTEXT -->
      <p class="hero-subtitle">
        Convert length, weight, temperature, volume, speed, and more in seconds.
      </p>

      <!-- CONVERTER BOX -->
      <div class="converter" id="converter">

        <!-- INPUT -->
        <input type="number" id="valueInput" placeholder="Enter value" autofocus />

        <!-- FROM -->
        <select id="fromUnit">
          <option>Meter</option>
          <option>Kilometer</option>
          <option>Centimeter</option>
          <option>Kilogram</option>
          <option>Gram</option>
          <option>Celsius</option>
          <option>Fahrenheit</option>
          <option>Liter</option>
          <option>Milliliter</option>
        </select>

        <!-- SWAP -->
        <button class="swap-btn" id="swapBtn">⇅</button>

        <!-- TO -->
        <select id="toUnit">
          <option>Meter</option>
          <option>Kilometer</option>
          <option>Centimeter</option>
          <option>Kilogram</option>
          <option>Gram</option>
          <option>Celsius</option>
          <option>Fahrenheit</option>
          <option>Liter</option>
          <option>Milliliter</option>
        </select>

        <!-- RESULT -->
        <div class="result">
          Result: <span id="resultValue">0.00</span>
        </div>

      </div>

    </div>

    <!-- BACKGROUND DECOR -->
    <div class="glow g1"></div>
    <div class="glow g2"></div>

  </section>

  <script src="script.js"></script>
  
</body>
</html>
