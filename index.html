<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraCalc - Advanced Scientific Calculator</title>
  <style>
    /* ==========================================
       1. VARIABLES & THEMES
       ========================================== */
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
      --panel-bg: rgba(15, 23, 42, 0.45);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      /* Button Accent Colors */
      --btn-basic-bg: rgba(255, 255, 255, 0.07);
      --btn-basic-hover: rgba(255, 255, 255, 0.14);
      --btn-sci-bg: rgba(99, 102, 241, 0.15);
      --btn-sci-hover: rgba(99, 102, 241, 0.28);
      --btn-fn-bg: rgba(168, 85, 247, 0.15);
      --btn-fn-hover: rgba(168, 85, 247, 0.28);
      --btn-op-bg: rgba(249, 115, 22, 0.2);
      --btn-op-hover: rgba(249, 115, 22, 0.35);
      --btn-action-bg: rgba(239, 68, 68, 0.2);
      --btn-action-hover: rgba(239, 68, 68, 0.35);
      --btn-eq-bg: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --btn-eq-hover: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
      
      --accent-glow: rgba(168, 85, 247, 0.4);
      --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --transition-speed: 0.25s;
    }

    [data-theme="light"] {
      --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #cbd5e1 100%);
      --panel-bg: rgba(255, 255, 255, 0.65);
      --panel-border: rgba(0, 0, 0, 0.08);
      --text-main: #0f172a;
      --text-muted: #64748b;
      
      --btn-basic-bg: rgba(0, 0, 0, 0.05);
      --btn-basic-hover: rgba(0, 0, 0, 0.1);
      --btn-sci-bg: rgba(99, 102, 241, 0.12);
      --btn-sci-hover: rgba(99, 102, 241, 0.22);
      --btn-fn-bg: rgba(168, 85, 247, 0.12);
      --btn-fn-hover: rgba(168, 85, 247, 0.22);
      --btn-op-bg: rgba(249, 115, 22, 0.15);
      --btn-op-hover: rgba(249, 115, 22, 0.28);
      --btn-action-bg: rgba(239, 68, 68, 0.15);
      --btn-action-hover: rgba(239, 68, 68, 0.28);
      
      --accent-glow: rgba(99, 102, 241, 0.25);
    }

    /* ==========================================
       2. GLOBAL & LAYOUT STYLES
       ========================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: var(--font-family);
      background: var(--bg-gradient);
      background-size: 400% 400%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      overflow-x: hidden;
      padding: 20px;
      position: relative;
    }
    
    body.animate-bg {
      animation: gradientShift 25s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .app-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      width: 100%;
      max-width: 1200px;
      align-items: start;
      position: relative;
      z-index: 10;
    }

    @media (min-width: 1024px) {
      .app-container {
        grid-template-columns: 1fr 380px;
      }
    }

    /* Floating Window Base */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
    }
    
    body.animate-on .glass-panel.floating-effect {
      animation: floatWidget 6s ease-in-out infinite alternate;
    }

    @keyframes floatWidget {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-10px); }
    }

    /* ==========================================
       3. CALCULATOR INTERFACE SCREEN
       ========================================== */
    .calculator-core {
      display: flex;
      flex-direction: column;
    }

    .display-container {
      padding: 28px;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .status-indicators {
      display: flex;
      gap: 12px;
    }

    .indicator-node {
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.05);
      display: none;
    }

    .indicator-node.active {
      display: inline-block;
      background: rgba(168, 85, 247, 0.2);
      color: #c084fc;
    }

    .expression-line {
      min-height: 28px;
      font-size: 1.25rem;
      color: var(--text-muted);
      text-align: right;
      word-wrap: break-word;
      word-break: break-all;
      overflow-y: auto;
      max-height: 60px;
    }

    .preview-line {
      min-height: 20px;
      font-size: 1rem;
      color: #10b981;
      text-align: right;
      opacity: 0.8;
    }

    .result-line {
      font-size: 3rem;
      font-weight: 300;
      text-align: right;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
      transition: font-size 0.15s ease;
    }

    .result-line::-webkit-scrollbar {
      display: none;
    }

    /* Error Message Overlay */
    .error-toast {
      position: absolute;
      bottom: 12px;
      left: 28px;
      right: 28px;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      transform: translateY(150%);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(5px);
    }

    .error-toast.visible {
      transform: translateY(0);
      opacity: 1;
    }

    /* Tabs / Controls Row */
    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.1);
      border-bottom: 1px solid var(--panel-border);
      gap: 10px;
      flex-wrap: wrap;
    }

    .mode-selectors {
      display: flex;
      gap: 6px;
    }

    .pill-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--panel-border);
      color: var(--text-main);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-speed);
    }

    .pill-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .pill-btn.active {
      background: #6366f1;
      border-color: #818cf8;
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
    }

    .utility-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-speed);
    }

    .icon-btn:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.08);
    }

    /* ==========================================
       4. KEYPAD GRID SYSTEM
       ========================================== */
    .keypad-container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    @media (min-width: 640px) {
      .keypad-container {
        grid-template-columns: repeat(7, 1fr);
      }
    }

    .calc-btn {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 16px 8px;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-main);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: background var(--transition-speed), transform 0.1s, box-shadow var(--transition-speed);
      min-height: 56px;
    }

    .calc-btn sub, .calc-btn sup {
      font-size: 0.65rem;
      opacity: 0.7;
    }

    /* Button Type Assignments */
    .btn-basic  { background: var(--btn-basic-bg); }
    .btn-basic:hover { background: var(--btn-basic-hover); }
    
    .btn-sci    { background: var(--btn-sci-bg); color: #a5b4fc; }
    .btn-sci:hover   { background: var(--btn-sci-hover); }
    
    .btn-fn     { background: var(--btn-fn-bg); color: #d8b4fe; }
    .btn-fn:hover    { background: var(--btn-fn-hover); }
    
    .btn-op     { background: var(--btn-op-bg); color: #fdba74; font-weight: 600; }
    .btn-op:hover    { background: var(--btn-op-hover); }
    
    .btn-action { background: var(--btn-action-bg); color: #fca5a5; }
    .btn-action:hover { background: var(--btn-action-hover); }
    
    .btn-eq     { background: var(--btn-eq-bg); grid-column: span 1; font-weight: 600; }
    .btn-eq:hover   { background: var(--btn-eq-hover); box-shadow: 0 0 15px var(--accent-glow); }

    @media (min-width: 640px) {
      .btn-eq { grid-column: span 2; }
    }

    body.animate-on .calc-btn:hover {
      transform: translateY(-2px);
    }

    .calc-btn:active {
      transform: scale(0.96) !important;
    }

    /* Keyboard Focus Indicator */
    .calc-btn:focus-visible {
      outline: 2px solid #a855f7;
      outline-offset: 2px;
    }

    /* Ripple Effect Node */
    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: rippleEffect 0.5s ease-out;
      background: rgba(255, 255, 255, 0.3);
      pointer-events: none;
    }

    @keyframes rippleEffect {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* ==========================================
       5. SIDE PANELS (HISTORY & SETTINGS)
       ========================================== */
    .side-panels-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .panel-header {
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-title {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* History Content Block */
    .history-list {
      max-height: 280px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    @media (min-width: 1024px) {
      .history-list { max-height: 400px; }
    }

    .history-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 12px;
      position: relative;
      cursor: pointer;
      transition: all var(--transition-speed);
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: slideIn 0.25s ease-out;
    }

    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .hist-time {
      font-size: 0.65rem;
      color: var(--text-muted);
      align-self: flex-start;
    }

    .hist-expr {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-align: right;
      word-break: break-all;
    }

    .hist-res {
      font-size: 1.15rem;
      font-weight: 600;
      text-align: right;
      color: #a855f7;
    }
    
    [data-theme="light"] .hist-res {
      color: #7c3aed;
    }

    .item-delete-btn {
      position: absolute;
      top: 8px;
      left: 8px;
      background: transparent;
      border: none;
      color: #ef4444;
      opacity: 0;
      cursor: pointer;
      transition: opacity var(--transition-speed);
      padding: 2px;
      border-radius: 4px;
    }

    .history-item:hover .item-delete-btn {
      opacity: 1;
    }

    .item-delete-btn:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Settings Content Block */
    .settings-grid {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .setting-control {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }

    .setting-control span {
      font-weight: 500;
    }

    .setting-select {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--panel-border);
      color: var(--text-main);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }

    .setting-select option {
      background: #1e1b4b;
      color: white;
    }

    /* Toggle Switches */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .3s;
      border-radius: 22px;
      border: 1px solid var(--panel-border);
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #6366f1;
    }

    input:checked + .slider:before {
      transform: translateX(22px);
    }

    /* Utility Helpers */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
  </style>
</head>
<body class="animate-bg animate-on">

  <div class="app-container">
    
    <!-- ==========================================
         MAIN CALCULATOR COMPONENT
         ========================================== -->
    <main class="glass-panel floating-effect calculator-core" role="application" aria-label="Advanced Scientific Calculator">
      
      <!-- Primary Display Interface -->
      <section class="display-container" aria-live="polite">
        <div class="status-bar">
          <span id="angle-mode-indicator">RAD</span>
          <div class="status-indicators">
            <span id="indicator-mem" class="indicator-node">M</span>
            <span id="indicator-hyp" class="indicator-node">HYP</span>
            <span id="indicator-inv" class="indicator-node">INV</span>
          </div>
        </div>
        
        <div class="expression-line" id="display-expression" placeholder="0" aria-label="Current Expression"></div>
        <div class="preview-line" id="display-preview" aria-label="Live Preview"></div>
        <div class="result-line" id="display-result" aria-label="Result Value" tabindex="0">0</div>
        
        <!-- Toast Notification Area for Parsing/Math Failures -->
        <div class="error-toast" id="error-toast" role="alert">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="error-message">Invalid Syntax</span>
        </div>
      </section>

      <!-- Contextual Action and Mode Switches -->
      <section class="control-row">
        <div class="mode-selectors">
          <button class="pill-btn active" id="btn-toggle-rad" onclick="calculator.setAngleMode('RAD')" aria-label="Set angle mode to radians">RAD</button>
          <button class="pill-btn" id="btn-toggle-deg" onclick="calculator.setAngleMode('DEG')" aria-label="Set angle mode to degrees">DEG</button>
          <button class="pill-btn" id="btn-toggle-grad" onclick="calculator.setAngleMode('GRAD')" aria-label="Set angle mode to gradians">GRAD</button>
        </div>
        
        <div class="mode-selectors">
          <button class="pill-btn" id="btn-toggle-inv" onclick="calculator.toggleInverse()" aria-label="Toggle Inverse Functions">INV</button>
          <button class="pill-btn" id="btn-toggle-hyp" onclick="calculator.toggleHyperbolic()" aria-label="Toggle Hyperbolic Functions">HYP</button>
        </div>

        <div class="utility-actions">
          <button class="icon-btn" onclick="calculator.undo()" title="Undo (Ctrl+Z)" aria-label="Undo last action">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
          </button>
          <button class="icon-btn" onclick="calculator.redo()" title="Redo (Ctrl+Y)" aria-label="Redo last action">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
          </button>
          <button class="icon-btn" onclick="calculator.copyToClipboard()" title="Copy Result (Ctrl+C)" aria-label="Copy result output">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </section>

      <!-- Standard & Scientific Button Keypad Map -->
      <section class="keypad-container" id="calc-keypad"></section>

    </main>

    <!-- ==========================================
         SIDE CONFIGURATION & HISTORICAL PANELS
         ========================================== -->
    <aside class="side-panels-container">
      
      <!-- History Log Window -->
      <section class="glass-panel" aria-label="Calculation History">
        <div class="panel-header">
          <h2 class="panel-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            History Log
          </h2>
          <button class="icon-btn" onclick="calculator.clearAllHistory()" title="Clear All Log Storage" aria-label="Clear history entries">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          </button>
        </div>
        <div class="history-list" id="history-items-box">
          <!-- Populated dynamically via Javascript state -->
        </div>
      </section>

      <!-- Application Settings View -->
      <section class="glass-panel" aria-label="Engine Settings">
        <div class="panel-header">
          <h2 class="panel-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Preferences
          </h2>
        </div>
        <div class="settings-grid">
          <div class="setting-control">
            <span>Visual Themes</span>
            <select class="setting-select" id="setting-theme" onchange="calculator.updateTheme(this.value)">
              <option value="dark">Aura Dark (Default)</option>
              <option value="light">Aura Light</option>
            </select>
          </div>
          <div class="setting-control">
            <span>UI Animations</span>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-toggle-anim" checked onchange="calculator.toggleAnimations(this.checked)">
              <span class="slider"></span>
            </label>
          </div>
          <div class="setting-control">
            <span>Audio Feedback</span>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-toggle-sound" onchange="calculator.toggleSound(this.checked)">
              <span class="slider"></span>
            </label>
          </div>
          <div class="setting-control">
            <span>Display Scale</span>
            <select class="setting-select" id="setting-font-size" onchange="calculator.updateFontScale(this.value)">
              <option value="normal">Standard Matrix</option>

    const EXPANDED_SCI_FUNCTIONS = {
      sin: { base: 'sin', inv: 'asin', hyp: 'sinh', invHyp: 'asinh' },
      cos: { base: 'cos', inv: 'acos', hyp: 'cosh', invHyp: 'acosh' },
      tan: { base: 'tan', inv: 'atan', hyp: 'tanh', invHyp: 'atanh' },

      sec: { base: 'sec', inv: 'asec', hyp: 'sech', invHyp: 'asech' },

    /**
     * MATHEMATICAL INTERPRETER ENGINE (LEXER & PARSER)
     * Replaces standard eval() entirely with a secure recursive descent parsing strategy.
     */
    class MathEngine {
      constructor(angleMode = 'RAD') {
        this.angleMode = angleMode;
        this.constants = { 'π': Math.PI, 'e': Math.E };
      }

      parseAndEvaluate(expressionString, variables = {}) {
        const tokens = this.tokenize(expressionString);
        let index = 0;

        const peek = () => tokens[index];
        const consume = (type) => {
          const t = tokens[index];
          if (t && t.type === type) { index++; return t; }
          return null;
        };

        // Expression Layer Parsing (Add / Sub)
        const parseExpression = () => {
          let node = parseTerm();
          while (peek() && (peek().type === 'PLUS' || peek().type === 'MINUS')) {
            const token = consume(peek().type);
            const right = parseTerm();
            node = { type: token.type, left: node, right: right };
          }
          return node;
        };

        // Term Layer Parsing (Mul / Div / Mod)
        const parseTerm = () => {
          let node = parseFactor();
          while (peek() && (peek().type === 'MUL' || peek().type === 'DIV' || peek().type === 'MOD')) {
            const token = consume(peek().type);
            const right = parseFactor();
            node = { type: token.type, left: node, right: right };
          }
          return node;
        };

        // Factor Layer Parsing (Powers / Roots / Postfix Operators)
        const parseFactor = () => {
          let node = parsePrimary();
          while (peek() && (peek().type === 'POW' || peek().type === 'FACT')) {
            if (peek().type === 'POW') {
              const token = consume('POW');
              const right = parseFactor(); // Right associative power mapping
              node = { type: 'POW', left: node, right: right };
            } else if (peek().type === 'FACT') {
              consume('FACT');
              node = { type: 'FACT', left: node };
            }
          }
          return node;
        };

        // Primary Structural Layer (Numbers, Enclosures, Functions)
        const parsePrimary = () => {
          const t = peek();
          if (!t) throw new Error('Unexpected end of expression');

          if (t.type === 'NUMBER') {
            consume('NUMBER');
            return { type: 'NUMBER', value: parseFloat(t.value) };
          }
          if (t.type === 'VAR') {
            consume('VAR');
            if (this.constants[t.value] !== undefined) {
              return { type: 'NUMBER', value: this.constants[t.value] };
            }
            if (variables[t.value] !== undefined) {
              return { type: 'NUMBER', value: variables[t.value] };
            }
            throw new Error(`Undefined reference: ${t.value}`);
          }
          if (t.type === 'MINUS') {
            consume('MINUS');
            return { type: 'UNARY_MINUS', left: parseFactor() };
          }
          if (t.type === 'PLUS') {
            consume('PLUS');
            return parseFactor();
          }
          if (t.type === 'LPAREN') {
            consume('LPAREN');
            const node = parseExpression();
            if (!consume('RPAREN')) {
              // Graceful compilation balancing instead of strict throwing
              return node; 
            }
            return node;
          }
          if (t.type === 'FUNC') {
            consume('FUNC');
            let next = peek();
            // Implicit parentheses handling for clear functional mappings
            if (next && next.type === 'LPAREN') {
              consume('LPAREN');
              const node = parseExpression();
              consume('RPAREN');
              return { type: 'FUNC', name: t.value, left: node };
            } else {
              const node = parseFactor();
              return { type: 'FUNC', name: t.value, left: node };
            }
          }

          throw new Error(`Unexpected token validation structural trace: ${t.value}`);
        };

        const ast = parseExpression();
        if (index < tokens.length) throw new Error('Extraneous expression segments remaining');
        return this.evaluateAST(ast);
      }

      tokenize(str) {
        const tokens = [];
        let i = 0;
        
        // Normalize typographic operators
        str = str.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');

        while (i < str.length) {
          const char = str[i];
          if (/\s/.test(char)) { i++; continue; }

          if (/[0-9.]/.test(char)) {
            let numStr = '';
            while (i < str.length && /[0-9.]/.test(str[i])) {
              numStr += str[i];
              i++;
            }
            tokens.push({ type: 'NUMBER', value: numStr });
            continue;
          }

          if (char === '+') { tokens.push({ type: 'PLUS', value: char }); i++; continue; }
          if (char === '-') { tokens.push({ type: 'MINUS', value: char }); i++; continue; }
          if (char === '*') { tokens.push({ type: 'MUL', value: char }); i++; continue; }
          if (char === '/') { tokens.push({ type: 'DIV', value: char }); i++; continue; }
          if (char === '%') { tokens.push({ type: 'MOD', value: char }); i++; continue; }
          if (char === '^') { tokens.push({ type: 'POW', value: char }); i++; continue; }
          if (char === '!') { tokens.push({ type: 'FACT', value: char }); i++; continue; }
          if (char === '(') { tokens.push({ type: 'LPAREN', value: char }); i++; continue; }
          if (char === ')') { tokens.push({ type: 'RPAREN', value: char }); i++; continue; }

          if (/[a-zA-Z0-9π]/.test(char)) {
            let wordStr = '';
            while (i < str.length && /[a-zA-Z0-9π]/.test(str[i])) {
              wordStr += str[i];
              i++;
            }
            if (['sin','cos','tan','cot','sec','cosec','asin','acos','atan','acot','asec','acosec',
                 'sinh','cosh','tanh','asinh','acosh','atanh','ln','log','log2','sqrt','cbrt',
                 'abs','floor','ceil','round','sign','rand','toFrac'].includes(wordStr)) {
              tokens.push({ type: 'FUNC', value: wordStr });
            } else {
              tokens.push({ type: 'VAR', value: wordStr });
            }
            continue;
          }
          throw new Error(`Illegal syntactic byte execution target: ${char}`);
        }
        return tokens;
      }

      evaluateAST(node) {
        if (!node) return 0;
        switch (node.type) {
          case 'NUMBER': return node.value;
          case 'UNARY_MINUS': return -this.evaluateAST(node.left);
          case 'PLUS': return this.evaluateAST(node.left) + this.evaluateAST(node.right);
          case 'MINUS': return this.evaluateAST(node.left) - this.evaluateAST(node.right);
          case 'MUL': return this.evaluateAST(node.left) * this.evaluateAST(node.right);
          case 'DIV': 
            const divisor = this.evaluateAST(node.right);
            if (divisor === 0) throw new Error('Division by zero');
            return this.evaluateAST(node.left) / divisor;
          case 'MOD': return this.evaluateAST(node.left) % this.evaluateAST(node.right);
          case 'POW': return Math.pow(this.evaluateAST(node.left), this.evaluateAST(node.right));
          case 'FACT': return this.factorial(this.evaluateAST(node.left));
          case 'FUNC': return this.executeFunction(node.name, this.evaluateAST(node.left));
          default: throw new Error('Malformed execution node target match failure');
        }
      }

      factorial(n) {
        if (n < 0) throw new Error('Negative Factorial Domain Complex Error');
        if (!Number.isInteger(n)) throw new Error('Floating Point Factorial Calculation Restricted');
        if (n > 170) throw new Error('Numeric Overflow Bound Breach');
        let r = 1;
        for (let i = 2; i <= n; i++) r *= i;
        return r;
      }

      executeFunction(name, val) {
        // Pre-processing angles based on configured angular mode matrix
        const toRad = (v) => {
          if (this.angleMode === 'DEG') return v * (Math.PI / 180);
          if (this.angleMode === 'GRAD') return v * (Math.PI / 200);
          return v;
        };
        const fromRad = (v) => {
          if (this.angleMode === 'DEG') return v * (180 / Math.PI);
          if (this.angleMode === 'GRAD') return v * (200 / Math.PI);
          return v;
        };

        switch (name) {
          case 'sin': return Math.sin(toRad(val));
          case 'cos': return Math.cos(toRad(val));
          case 'tan': return Math.tan(toRad(val));
          case 'cot': return 1 / Math.tan(toRad(val));
          case 'sec': return 1 / Math.cos(toRad(val));
          case 'cosec': return 1 / Math.sin(toRad(val));
          
          case 'asin': return fromRad(Math.asin(val));
          case 'acos': return fromRad(Math.acos(val));
          case 'atan': return fromRad(Math.atan(val));
          case 'acot': return fromRad(Math.PI / 2 - Math.atan(val));
          case 'asec': return fromRad(Math.acos(1 / val));
          case 'acosec': return fromRad(Math.asin(1 / val));

          case 'sinh': return Math.sinh(val);
          case 'cosh': return Math.cosh(val);
          case 'tanh': return Math.tanh(val);
          case 'asinh': return Math.asinh(val);
          case 'acosh': if (val < 1) throw new Error('Log domain execution restriction breach'); return Math.acosh(val);
          case 'atanh': return Math.atanh(val);

          case 'ln': if (val <= 0) throw new Error('Log domain error'); return Math.log(val);
          case 'log': if (val <= 0) throw new Error('Log domain error'); return Math.log10(val);
          case 'log2': if (val <= 0) throw new Error('Log domain error'); return Math.log2(val);
          case 'sqrt': if (val < 0) throw new Error('Imaginary structural value return bypass'); return Math.sqrt(val);
          case 'cbrt': return Math.cbrt(val);
          case 'abs': return Math.abs(val);
          case 'floor': return Math.floor(val);
          case 'ceil': return Math.ceil(val);
          case 'round': return Math.round(val);
          case 'sign': return Math.sign(val);
          case 'rand': return Math.random() * val;
          default: throw new Error(`Function not implemented: ${name}`);
        }
      }
    }

    /**
     * CORE RUNTIME MANAGEMENT CLASS (CONTROLLER / STATE COORDINATOR)
     */
    class CalculatorController {
      constructor() {
        this.expression = '';
        this.lastAnswer = 0;
        this.memoryValue = 0;
        this.angleMode = 'RAD';
        this.isInverse = false;
        this.isHyperbolic = false;
        
        this.history = JSON.parse(localStorage.getItem('auracalc_history') || '[]');
        this.undoStack = [];
        this.redoStack = [];
        
        // Settings configuration local mappings
        this.settings = {
          theme: localStorage.getItem('setting_theme') || 'dark',
          animations: localStorage.getItem('setting_anim') !== 'false',
          sound: localStorage.getItem('setting_sound') === 'true',
          fontSize: localStorage.getItem('setting_font') || 'normal',
          historyLimit: parseInt(localStorage.getItem('setting_hlimit') || '20', 10)
        };

        this.engine = new MathEngine(this.angleMode);
        this.audioCtx = null;
      }

      init() {
        this.renderKeypad();
        this.applySettingsUI();
        this.syncHistoryUI();
        this.updateDisplay();
        this.setupGlobalKeyBindings();
      }

      saveState() {
        if (this.undoStack.length > 50) this.undoStack.shift();
        this.undoStack.push(this.expression);
        this.redoStack = []; // Break forward linear path alignment
      }

      undo() {
        if (this.undoStack.length > 0) {
          this.redoStack.push(this.expression);
          this.expression = this.undoStack.pop();
          this.updateDisplay();
          this.playClickAudio(400, 0.05);
        }
      }

      redo() {
        if (this.redoStack.length > 0) {
          this.undoStack.push(this.expression);
          this.expression = this.redoStack.pop();
          this.updateDisplay();
          this.playClickAudio(450, 0.05);
        }
      }

      setAngleMode(mode) {
        this.angleMode = mode;
        this.engine.angleMode = mode;
        ['rad', 'deg', 'grad'].forEach(m => {
          document.getElementById(`btn-toggle-${m}`).classList.toggle('active', m.toUpperCase() === mode);
        });
        document.getElementById('angle-mode-indicator').innerText = mode;
        this.updateDisplay();
        this.playClickAudio(500, 0.04);
      }

      toggleInverse() {
        this.isInverse = !this.isInverse;
        document.getElementById('btn-toggle-inv').classList.toggle('active', this.isInverse);
        document.getElementById('indicator-inv').classList.toggle('active', this.isInverse);
        this.renderKeypad();
        this.playClickAudio(480, 0.04);
      }

      toggleHyperbolic() {
        this.isHyperbolic = !this.isHyperbolic;
        document.getElementById('btn-toggle-hyp').classList.toggle('active', this.isHyperbolic);
        document.getElementById('indicator-hyp').classList.toggle('active', this.isHyperbolic);
        this.renderKeypad();
        this.playClickAudio(480, 0.04);
      }

      handleInput(action, value) {
        this.hideErrorToast();
        this.playClickAudio(600, 0.02);

        switch (action) {
          case 'num':
          case 'operator':
            this.saveState();
            this.expression += value;
            break;
          case 'const':
            this.saveState();
            this.expression += value;
            break;
          case 'func':
            this.saveState();
            this.expression += value + '(';
            break;
          case 'postfix':
            this.saveState();
            this.expression += value;
            break;
          case 'clear-all':
            this.saveState();
            this.expression = '';
            break;
          case 'clear-entry':
            this.saveState();
            this.expression = '';
            break;
          case 'backspace':
            this.saveState();
            this.expression = this.expression.slice(0, -1);
            break;
          case 'ans':
            this.saveState();
            this.expression += 'Ans';
            break;
          case 'negate':
            this.saveState();
            this.toggleExpressionNegation();
            break;
          case 'mem-clear':
            this.memoryValue = 0;
            document.getElementById('indicator-mem').classList.remove('active');
            break;
          case 'mem-recall':
            this.saveState();
            this.expression += this.memoryValue.toString();
            break;
          case 'mem-store':
            this.executeDirectMemoryAssignment();
            break;
          case 'mem-add':
            this.mutateMemoryValue('ADD');
            break;
          case 'mem-sub':
            this.mutateMemoryValue('SUB');
            break;
          case 'calculate':
            this.processPrimaryEvaluation();
            return;
        }
        this.updateDisplay();
      }

      toggleExpressionNegation() {
        if (this.expression.startsWith('-(') && this.expression.endsWith(')')) {
          this.expression = this.expression.slice(2, -1);
        } else if (this.expression.startsWith('-')) {
          this.expression = `(${this.expression})`;
        } else {
          this.expression = `-(${this.expression})`;
        }
      }

      async executeDirectMemoryAssignment() {
        try {
          const res = this.evaluateCurrentEngineState();
          this.memoryValue = res;
          document.getElementById('indicator-mem').classList.add('active');
          this.playClickAudio(700, 0.1);
        } catch (e) {
          this.showErrorToast("Memory assignment target evaluation tracking error");
        }
      }

      async mutateMemoryValue(type) {
        try {
          const res = this.evaluateCurrentEngineState();
          if (type === 'ADD') this.memoryValue += res;
          if (type === 'SUB') this.memoryValue -= res;
          document.getElementById('indicator-mem').classList.add('active');
          this.playClickAudio(700, 0.1);
        } catch (e) {
          this.showErrorToast("Memory variant modifier application failure");
        }
      }

      evaluateCurrentEngineState() {
        if (!this.expression.trim()) return 0;
        let runningString = this.expression.replace(/Ans/g, this.lastAnswer.toString());
        
        // Auto-balance syntax configurations before ingestion
        let openParenCount = (runningString.match(/\(/g) || []).length;
        let closeParenCount = (runningString.match(/\)/g) || []).length;
        while (openParenCount > closeParenCount) {
          runningString += ')';
          closeParenCount++;
        }

        return this.engine.parseAndEvaluate(runningString);
      }

      updateDisplay() {
        const displayExpr = document.getElementById('display-expression');
        const displayPreview = document.getElementById('display-preview');
        
        displayExpr.innerText = this.expression || '0';
        
        if (!this.expression.trim()) {
          displayPreview.innerText = '';
          return;
        }

        // Live calculation pipeline updates executed defensively
        try {
          const out = this.evaluateCurrentEngineState();
          if (isNaN(out) || !isFinite(out)) {
            displayPreview.innerText = '';
          } else {
            displayPreview.innerText = '= ' + this.formatOutputResolution(out);
          }
        } catch (err) {
          displayPreview.innerText = '';
        }
      }

      processPrimaryEvaluation() {
        if (!this.expression.trim()) return;
        
        try {
          const outcome = this.evaluateCurrentEngineState();
          
          if (isNaN(outcome)) throw new Error('Result evaluation resolved to NaN bounds');
          if (!isFinite(outcome)) throw new Error('Numeric Overflow Limit Exceeded');

          const formattedResult = this.formatOutputResolution(outcome);
          
          // Push entry into historical storage structure
          this.appendHistoryRecord(this.expression, formattedResult);
          
          this.lastAnswer = outcome;
          this.expression = formattedResult;
          
          document.getElementById('display-result').innerText = formattedResult;
          this.updateDisplay();
          this.playClickAudio(850, 0.08);

        } catch (err) {
          this.showErrorToast(err.message || "Syntactic Processing Error");
        }
      }

      formatOutputResolution(val) {
        if (Math.abs(val) > 1e12 || (Math.abs(val) < 1e-6 && val !== 0)) {
          return val.toExponential(7);
        }
        // Eliminate trailing precision noise artifacts standard to structural IEEE floating points
        return parseFloat(val.toFixed(10)).toString();
      }

      showErrorToast(msg) {
        const toast = document.getElementById('error-toast');
        document.getElementById('error-message').innerText = msg;
        toast.classList.add('visible');
        this.playClickAudio(220, 0.25); // Lower heavy alarm frequency pulse
        
        if (this.settings.animations) {
          toast.animate([
            { transform: 'translateX(-10px)' },
            { transform: 'translateX(10px)' },
            { transform: 'translateX(0)' }
          ], { duration: 150, iterations: 2 });
        }
      }

      hideErrorToast() {
        document.getElementById('error-toast').classList.remove('visible');
      }

      appendHistoryRecord(expr, res) {
        const record = {
          id: Date.now(),
          expression: expr,
          result: res,
          timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
        };
        
        this.history.unshift(record);
        if (this.history.length > this.settings.historyLimit) {
          this.history.pop();
        }
        
        localStorage.setItem('auracalc_history', JSON.stringify(this.history));
        this.syncHistoryUI();
      }

      deleteHistoryItem(id, event) {
        if (event) event.stopPropagation();
        this.history = this.history.filter(item => item.id !== id);
        localStorage.setItem('auracalc_history', JSON.stringify(this.history));
        this.syncHistoryUI();
      }

      clearAllHistory() {
        this.history = [];
        localStorage.removeItem('auracalc_history');
        this.syncHistoryUI();
      }

      syncHistoryUI() {
        const container = document.getElementById('history-items-box');
        container.innerHTML = '';

        if (this.history.length === 0) {
          container.innerHTML = `<div class="empty-state">No historical operations logged.</div>`;
          return;
        }

        this.history.forEach(item => {
          const element = document.createElement('div');
          element.className = 'history-item';
          element.setAttribute('tabindex', '0');
          element.setAttribute('role', 'button');
          element.setAttribute('aria-label', `Load historic computation: ${item.expression} yielding ${item.result}`);
          element.onclick = () => {
            this.saveState();
            this.expression = item.expression;
            this.updateDisplay();
          };
          
          element.innerHTML = `
            <button class="item-delete-btn" title="Remove log element" aria-label="Delete this item">×</button>
            <span class="hist-time">${item.timestamp}</span>
            <div class="hist-expr">${item.expression}</div>
            <div class="hist-res">${item.result}</div>
          `;
          
          element.querySelector('.item-delete-btn').onclick = (e) => this.deleteHistoryItem(item.id, e);
          container.appendChild(element);
        });
      }

      /**
       * LAYOUT RENDER ENGINE
       * Iterates configuration matrix mapping current logical visual structures.
       */
      renderKeypad() {
        const grid = document.getElementById('calc-keypad');
        grid.innerHTML = '';

        KEYPAD_MAP.forEach(btn => {
          const el = document.createElement('button');
          el.className = `calc-btn ${btn.type}`;
          el.setAttribute('aria-label', btn.label);
          
          let parsedLabel = btn.label;
          let activeAction = btn.action;
          let activeValue = btn.value;

          // Process dynamic text modifications based on context shifts (INV / HYP flags)
          if (btn.action === 'func' && EXPANDED_SCI_FUNCTIONS[btn.value]) {
            const config = EXPANDED_SCI_FUNCTIONS[btn.value];
            let resolvedKey = 'base';
            if (this.isInverse && this.isHyperbolic && config.invHyp) resolvedKey = 'invHyp';
            else if (this.isInverse && config.inv) resolvedKey = 'inv';
            else if (this.isHyperbolic && config.hyp) resolvedKey = 'hyp';
            
            const targetFunc = config[resolvedKey] || config.base;
            parsedLabel = targetFunc;
            activeValue = targetFunc;
          }

          // Format specific sub-properties visually
          if (parsedLabel === 'x²') el.innerHTML = 'x<sup>2</sup>';
          else if (parsedLabel === 'x³') el.innerHTML = 'x<sup>3</sup>';
          else if (parsedLabel === 'xʸ') el.innerHTML = 'x<sup>y</sup>';
          else if (parsedLabel === '1/x') el.innerHTML = '1/<sub>x</sub>';
          else el.innerText = parsedLabel;

          el.onclick = (e) => {
            this.createRippleEffect(e);
            this.handleInput(activeAction, activeValue);
          };

          grid.appendChild(el);
        });
      }

      createRippleEffect(event) {
        if (!this.settings.animations) return;
        const btn = event.currentTarget;
        const circle = document.createElement('span');
        const diameter = Math.max(btn.clientWidth, btn.clientHeight);
        const radius = diameter / 2;

        const rect = btn.getBoundingClientRect();
        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${event.clientX - rect.left - radius}px`;
        circle.style.top = `${event.clientY - rect.top - radius}px`;
        circle.classList.add('ripple');

        const prevRipple = btn.querySelector('.ripple');
        if (prevRipple) prevRipple.remove();

        btn.appendChild(circle);
      }

      playClickAudio(freq = 600, duration = 0.02) {
        if (!this.settings.sound) return;
        try {
          if (!this.audioCtx) {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          }
          const osc = this.audioCtx.createOscillator();
          const gain = this.audioCtx.createGain();
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
          gain.gain.setValueAtTime(0.04, this.audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.00001, this.audioCtx.currentTime + duration);
          
          osc.connect(gain);
          gain.connect(this.audioCtx.destination);
          
          osc.start();
          osc.stop(this.audioCtx.currentTime + duration);
        } catch (e) {
          // Audio context execution context blocked or unsupported natively
        }
      }

      async copyToClipboard() {
        const text = document.getElementById('display-result').innerText;
        try {
          await navigator.clipboard.writeText(text);
          this.playClickAudio(900, 0.05);
        } catch (err) {
          this.showErrorToast("System Clipboard access failed");
        }
      }

      /**
       * SYSTEM USER SETTINGS STATE MUTATIONS
       */
      updateTheme(theme) {
        this.settings.theme = theme;
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('setting_theme', theme);
      }

      toggleAnimations(enabled) {
        this.settings.animations = enabled;
        document.body.classList.toggle('animate-bg', enabled);
        document.body.classList.toggle('animate-on', enabled);
        localStorage.setItem('setting_anim', enabled);
      }

      toggleSound(enabled) {
        this.settings.sound = enabled;
        localStorage.setItem('setting_sound', enabled);
      }

      updateFontScale(scale) {
        this.settings.fontSize = scale;
        document.getElementById('display-result').style.fontSize = scale === 'large' ? '3.75rem' : '3rem';
        localStorage.setItem('setting_font', scale);
      }

      updateHistoryLimit(limit) {
        this.settings.historyLimit = parseInt(limit, 10);
        localStorage.setItem('setting_hlimit', limit);
      }

      applySettingsUI() {
        document.getElementById('setting-theme').value = this.settings.theme;
        this.updateTheme(this.settings.theme);

        document.getElementById('setting-toggle-anim').checked = this.settings.animations;
        this.toggleAnimations(this.settings.animations);

        document.getElementById('setting-toggle-sound').checked = this.settings.sound;
        
        document.getElementById('setting-font-size').value = this.settings.fontSize;
        this.updateFontScale(this.settings.fontSize);

        document.getElementById('setting-hist-limit').value = this.settings.historyLimit;
      }

      /**
       * HARDWARE KEYBOARD EVENT HANDLING INTERFACES
       */
      setupGlobalKeyBindings() {
        document.addEventListener('keydown', (e) => {
          // Exclude routing standard operation captures mapping internal selectors
          if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;

          const key = e.key;
          
          // Structural Multi-Key Shortcut Commands Interception
          if (e.ctrlKey || e.metaKey) {
            if (key.toLowerCase() === 'z') { e.preventDefault(); this.undo(); }
            if (key.toLowerCase() === 'y') { e.preventDefault(); this.redo(); }
            if (key.toLowerCase() === 'c') { /* Native cascade handling */ }
            return;
          }

          if (/[0-9.]/.test(key)) { e.preventDefault(); this.handleInput('num', key); }
          else if (key === '+') { e.preventDefault(); this.handleInput('operator', '+'); }
          else if (key === '-') { e.preventDefault(); this.handleInput('operator', '-'); }
          else if (key === '*') { e.preventDefault(); this.handleInput('operator', '*'); }
          else if (key === '/') { e.preventDefault(); this.handleInput('operator', '/'); }
          else if (key === '%') { e.preventDefault(); this.handleInput('operator', '%'); }
          else if (key === '^') { e.preventDefault(); this.handleInput('operator', '^'); }
          else if (key === '!') { e.preventDefault(); this.handleInput('postfix', '!'); }
          else if (key === '(' || key === ')') { e.preventDefault(); this.handleInput('num', key); }
          else if (key === 'Enter' || key === '=') { e.preventDefault(); this.processPrimaryEvaluation(); }
          else if (key === 'Backspace') { e.preventDefault(); this.handleInput('backspace'); }
          else if (key === 'Delete') { e.preventDefault(); this.handleInput('clear-entry'); }
          else if (key === 'Escape') { e.preventDefault(); this.handleInput('clear-all'); }
        });
      }
    }

    // Instantiation entry execution
    const calculator = new CalculatorController();
    window.addEventListener('DOMContentLoaded', () => calculator.init());
  </script>
</body>
