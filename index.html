<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Utilmint Unit Converter</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="nav">
  <div class="logo">Utilmint</div>

  <nav class="nav-links">
    <a href="#">Home</a>
    <a href="#converter">Converter</a>
    <a href="#tools">Tools</a>
    <a href="#learn">Learn</a>
  </nav>

  <button id="themeToggle" class="btn">🌙</button>
</header>

<main>

<!-- HERO -->
<section class="hero" id="converter">
  <div class="hero-content">
    <h1>All-in-One Unit Converter</h1>
    <p>Fast • Accurate • Real-time conversions</p>
  </div>

  <div class="card converter">

    <input id="inputValue" type="number" placeholder="Enter value..." />

    <div class="row">
      <select id="category"></select>
    </div>

    <div class="row grid-3">
      <select id="fromUnit"></select>

      <button id="swap" class="swap">⇄</button>

      <select id="toUnit"></select>
    </div>

    <div class="result">
      <h2 id="output">0</h2>
      <button id="copy">Copy</button>
    </div>

    <div class="quick">
      <button data-cat="Length">Length</button>
      <button data-cat="Mass">Mass</button>
      <button data-cat="Temperature">Temp</button>
      <button data-cat="Speed">Speed</button>
    </div>

  </div>
</section>

<!-- CATEGORIES -->
<section class="section">
  <h2>Categories</h2>

  <div class="grid">
    <div class="tile">📏 Length</div>
    <div class="tile">⚖️ Mass</div>
    <div class="tile">🌡️ Temperature</div>
    <div class="tile">🧪 Volume</div>
    <div class="tile">🚗 Speed</div>
    <div class="tile">💾 Data</div>
    <div class="tile">⚡ Energy</div>
    <div class="tile">🔌 Electricity</div>
    <div class="tile">⏱️ Time</div>
  </div>
</section>

<!-- CTA -->
<section class="cta">
  <h2>Make every conversion effortless.</h2>
  <button class="primary">Open Converter</button>
</section>

</main>

<footer>
  <p>© 2026 Utilmint. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
