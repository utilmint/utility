<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Utilmint — Offline Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<a href="https://instagram.com" target="_blank" class="icon instagram">
    <i class="fab fa-instagram"></i>
  </a>
<style>
:root{
  --mint:#3EE8A8;
  --mint-dim:#22A374;
  --mint-glow: rgba(62,232,168,0.18);
  --bg:#0A0F0D;
  --surface:#111917;
  --surface-2:#161F1C;
  --surface-3:#1C2723;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.14);
  --text:#EAF2ED;
  --text-dim:#93A69D;
  --text-faint:#5C6C65;
  --red:#FF6E6E;
  --red-dim: rgba(255,110,110,0.15);
  --amber:#FFC069;
  --amber-dim: rgba(255,192,105,0.15);
  --radius-s: 10px;
  --radius-m: 16px;
  --radius-l: 22px;
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'Manrope', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
  --sidebar-w: 240px;
}
html[data-theme="light"]{
  --bg:#F3F6F3;
  --surface:#FFFFFF;
  --surface-2:#F8FAF8;
  --surface-3:#EEF2EF;
  --border: rgba(10,20,15,0.08);
  --border-strong: rgba(10,20,15,0.16);
  --text:#0E1512;
  --text-dim:#5C6C65;
  --text-faint:#8B9992;
  --mint-glow: rgba(34,163,116,0.12);
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:var(--font-body);
  transition: background .25s ease, color .25s ease;
  overflow-x:hidden;
}
body[data-fontsize="sm"]{ font-size: 14px; }
body[data-fontsize="md"]{ font-size: 15.5px; }
body[data-fontsize="lg"]{ font-size: 17.5px; }
h1,h2,h3,h4{ font-family: var(--font-display); font-weight:600; margin:0; letter-spacing:-0.01em;}
.mono{font-family:var(--font-mono);}
button{ font-family:inherit; }
::selection{ background: var(--mint-glow); }
a{color:inherit;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

#lockscreen{
  position:fixed; inset:0; z-index:500; background:var(--bg);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:22px;
}
.lock-leaf{ width:56px; height:56px; }
.pin-dots{ display:flex; gap:14px; }
.pin-dot{ width:14px; height:14px; border-radius:50%; border:1.5px solid var(--border-strong); transition: all .15s;}
.pin-dot.filled{ background:var(--mint); border-color:var(--mint); box-shadow:0 0 12px var(--mint-glow);}
.pin-dot.err{ background:var(--red); border-color:var(--red); }
.keypad{ display:grid; grid-template-columns:repeat(3,64px); gap:14px; }
.keypad button{
  width:64px; height:64px; border-radius:50%; border:1px solid var(--border);
  background:var(--surface-2); color:var(--text); font-size:20px; font-family:var(--font-display);
  cursor:pointer; transition: all .12s;
}
.keypad button:active{ background:var(--surface-3); transform:scale(0.94); }
.keypad button.ghost{ background:transparent; border:none; color:var(--text-dim); }

#app-shell{ display:flex; min-height:100vh; }
#sidebar{
  width:var(--sidebar-w); flex-shrink:0; background:var(--surface); border-right:1px solid var(--border);
  padding:26px 16px; display:flex; flex-direction:column; gap:4px; position:sticky; top:0; height:100vh;
}
.brand{ display:flex; align-items:center; gap:10px; padding:6px 10px 26px; }
.brand svg{ width:26px; height:26px; }
.brand span{ font-family:var(--font-display); font-weight:700; font-size:19px; letter-spacing:-0.02em;}
.nav-item{
  display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:12px; color:var(--text-dim);
  cursor:pointer; font-weight:600; font-size:14px; transition: all .12s; border:1px solid transparent;
}
.nav-item svg{ width:18px; height:18px; flex-shrink:0; }
.nav-item:hover{ background:var(--surface-2); color:var(--text); }
.nav-item.active{ background:var(--mint-glow); color:var(--mint); border-color: rgba(62,232,168,0.25); }
.sidebar-foot{ margin-top:auto; display:flex; flex-direction:column; gap:4px; }

#topbar{
  display:none; align-items:center; justify-content:space-between; padding:16px 18px;
  border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:40;
}
#drawer-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:60; display:none; }
#drawer{
  position:fixed; top:0; left:0; bottom:0; width:250px; background:var(--surface); z-index:61;
  transform:translateX(-100%); transition: transform .22s ease; padding:22px 14px; display:flex; flex-direction:column; gap:4px;
}
#drawer.open{ transform:translateX(0); }
#drawer-overlay.open{ display:block; }

main#content{ flex:1; min-width:0; padding:28px 34px 90px; max-width:1180px; }
.icon-btn{
  width:38px; height:38px; border-radius:10px; border:1px solid var(--border); background:var(--surface-2);
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text); flex-shrink:0;
}
.icon-btn svg{ width:17px; height:17px; }
.icon-btn:hover{ border-color:var(--border-strong); }

.page-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; gap:12px; flex-wrap:wrap;}
.page-head h1{ font-size:24px; }
.eyebrow{ color:var(--text-faint); font-size:12px; text-transform:uppercase; letter-spacing:0.09em; font-weight:600; margin-bottom:4px;}

.grid{ display:grid; gap:14px; }
.grid-4{ grid-template-columns:repeat(4,1fr); }
.grid-2{ grid-template-columns:1fr 1fr; }
@media(max-width:980px){ .grid-4{grid-template-columns:repeat(2,1fr);} }
@media(max-width:640px){ .grid-4{grid-template-columns:1fr 1fr;} .grid-2{grid-template-columns:1fr;} }

.card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-m); padding:18px;
}
.card.hoverable{ cursor:pointer; transition: border-color .15s, transform .15s; }
.card.hoverable:hover{ border-color:var(--border-strong); transform:translateY(-1px); }

.stat-card{ display:flex; flex-direction:column; gap:10px; }
.stat-top{ display:flex; align-items:center; justify-content:space-between; }
.stat-icon{ width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
.stat-icon svg{ width:16px; height:16px; }
.stat-label{ color:var(--text-dim); font-size:12.5px; font-weight:600; }
.stat-value{ font-family:var(--font-display); font-size:23px; font-weight:700; letter-spacing:-0.02em; }
.stat-sub{ font-size:11.5px; color:var(--text-faint); }

.hero-balance{
  background: linear-gradient(150deg, var(--surface-2), var(--surface) 70%);
  border:1px solid var(--border); border-radius:var(--radius-l); padding:26px 26px 18px;
  position:relative; overflow:hidden; margin-bottom:16px;
}
.hero-balance::after{
  content:''; position:absolute; right:-60px; top:-60px; width:220px; height:220px; border-radius:50%;
  background: radial-gradient(circle, var(--mint-glow), transparent 70%);
}
.hero-top{ display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1;}
.hero-amount{ font-family:var(--font-display); font-size:42px; font-weight:700; letter-spacing:-0.02em; margin-top:6px;}
.hero-meta{ display:flex; gap:22px; margin-top:18px; position:relative; z-index:1; flex-wrap:wrap;}
.hero-meta-item{ display:flex; align-items:center; gap:8px; }
.hero-meta-item .dot{ width:8px; height:8px; border-radius:50%; }
.sparkline{ position:relative; z-index:1; margin-top:14px; height:46px; }

.btn{
  border:none; border-radius:12px; padding:11px 18px; font-weight:700; font-size:13.5px; cursor:pointer;
  display:inline-flex; align-items:center; gap:8px; transition: all .12s; font-family:var(--font-body);
}
.btn svg{ width:15px; height:15px; }
.btn-primary{ background:var(--mint); color:#04140D; }
.btn-primary:hover{ background:#5CF0BC; }
.btn-secondary{ background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover{ border-color:var(--border-strong); }
.btn-danger{ background:var(--red-dim); color:var(--red); }
.btn-ghost{ background:transparent; color:var(--text-dim); padding:8px 10px; }
.btn-ghost:hover{ color:var(--text); }
.btn-block{ width:100%; justify-content:center; }
.btn-sm{ padding:7px 12px; font-size:12.5px; border-radius:9px; }
.btn:disabled{ opacity:.45; cursor:not-allowed; }

.quick-actions{ display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin:18px 0 24px; }
@media(max-width:900px){ .quick-actions{ grid-template-columns:repeat(3,1fr);} }
.qa-btn{
  background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 8px;
  display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; color:var(--text);
  font-size:11.5px; font-weight:700; text-align:center;
}
.qa-btn:hover{ border-color:var(--mint); color:var(--mint); }
.qa-btn svg{ width:19px; height:19px; }

.section-title{ display:flex; align-items:center; justify-content:space-between; margin:26px 0 12px; }
.section-title h3{ font-size:15px; }
.link-sm{ font-size:12.5px; color:var(--mint); font-weight:700; cursor:pointer; display:flex; align-items:center; gap:3px;}

.txn-row{
  display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:14px; border:1px solid transparent;
  cursor:pointer; transition: background .12s;
}
.txn-row:hover{ background:var(--surface-2); border-color:var(--border); }
.txn-icon{ width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.txn-icon svg{ width:16px; height:16px; }
.txn-mid{ flex:1; min-width:0; }
.txn-title{ font-weight:700; font-size:14px; display:flex; align-items:center; gap:6px; }
.txn-sub{ font-size:12px; color:var(--text-faint); margin-top:2px; }
.txn-amt{ font-family:var(--font-mono); font-weight:600; font-size:14.5px; white-space:nowrap; }
.txn-amt.pos{ color:var(--mint); }
.txn-amt.neg{ color:var(--red); }

.empty-state{ text-align:center; padding:50px 20px; color:var(--text-faint); }
.empty-state svg{ width:44px; height:44px; margin-bottom:14px; opacity:.5;}
.empty-state h4{ color:var(--text-dim); margin-bottom:6px; font-size:15px;}
.empty-state p{ font-size:13px; max-width:280px; margin:0 auto; }

.badge{ font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.03em;}
.badge-fav{ background:var(--amber-dim); color:var(--amber); }
.badge-rec{ background:var(--mint-glow); color:var(--mint); }

.modal-overlay{
  position:fixed; inset:0; background:rgba(4,8,6,0.6); backdrop-filter: blur(3px); z-index:200;
  display:flex; align-items:flex-end; justify-content:center;
}
@media(min-width:640px){ .modal-overlay{ align-items:center; } }
.modal{
  background:var(--surface); border:1px solid var(--border-strong); width:100%; max-width:460px;
  border-radius:20px 20px 0 0; padding:22px; max-height:88vh; overflow-y:auto; animation: slideUp .18s ease;
}
@media(min-width:640px){ .modal{ border-radius:20px; } }
@keyframes slideUp{ from{ transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;} }
.modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.modal-head h3{ font-size:17px; }

.field{ margin-bottom:14px; }
.field label{ display:block; font-size:12.5px; font-weight:700; color:var(--text-dim); margin-bottom:7px; }
.field input, .field select, .field textarea{
  width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:11px; padding:11px 13px;
  color:var(--text); font-family:inherit; font-size:14px; outline:none; transition: border-color .12s;
}
.field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--mint); }
.field textarea{ resize:vertical; min-height:60px; }
.seg{ display:flex; background:var(--surface-2); border-radius:11px; padding:4px; border:1px solid var(--border); }
.seg button{ flex:1; border:none; background:transparent; padding:9px; border-radius:8px; color:var(--text-dim); font-weight:700; font-size:13px; cursor:pointer;}
.seg button.active{ background:var(--mint); color:#04140D; }
.chip-row{ display:flex; flex-wrap:wrap; gap:8px; }
.chip{ padding:8px 13px; border-radius:20px; background:var(--surface-2); border:1px solid var(--border); font-size:12.5px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px;}
.chip.active{ background:var(--mint-glow); border-color:var(--mint); color:var(--mint); }

.progress-track{ height:8px; background:var(--surface-3); border-radius:20px; overflow:hidden; }
.progress-fill{ height:100%; border-radius:20px; background:var(--mint); transition: width .3s ease; }
.progress-fill.over{ background:var(--red); }
.progress-fill.warn{ background:var(--amber); }

.toast-wrap{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:300; display:flex; flex-direction:column; gap:8px; align-items:center; width:min(92vw,380px); }
.toast{
  background:var(--surface-3); border:1px solid var(--border-strong); border-radius:13px; padding:12px 16px;
  display:flex; align-items:center; gap:10px; font-size:13px; font-weight:600; box-shadow:0 10px 30px rgba(0,0,0,0.35);
  animation: toastIn .2s ease;
}
@keyframes toastIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
.toast svg{ width:16px; height:16px; flex-shrink:0; }
.toast.success{ color:var(--mint); }
.toast.error{ color:var(--red); }
.toast.info{ color:var(--text); }
.toast .toast-action{ color:var(--mint); font-weight:800; cursor:pointer; margin-left:auto; }

.alert-banner{
  display:flex; align-items:center; gap:10px; padding:12px 15px; border-radius:13px; margin-bottom:10px;
  font-size:13px; font-weight:600; border:1px solid;
}
.alert-banner svg{ width:16px; height:16px; flex-shrink:0;}
.alert-warn{ background:var(--amber-dim); border-color:rgba(255,192,105,0.3); color:var(--amber); }
.alert-danger{ background:var(--red-dim); border-color:rgba(255,110,110,0.3); color:var(--red); }
.alert-mint{ background:var(--mint-glow); border-color:rgba(62,232,168,0.3); color:var(--mint); }

.wallet-card{ padding:20px; border-radius:18px; position:relative; overflow:hidden; cursor:pointer; border:1px solid var(--border); }
.wallet-card.active{ border-color:var(--mint); }
.wallet-card .wname{ font-weight:700; font-size:15px; display:flex; align-items:center; gap:8px; margin-bottom:14px;}
.wallet-card .wbal{ font-family:var(--font-display); font-size:24px; font-weight:700; }

table.tbl{ width:100%; border-collapse:collapse; font-size:13px; }
table.tbl th{ text-align:left; color:var(--text-faint); font-weight:700; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; padding:8px 10px; border-bottom:1px solid var(--border); }
table.tbl td{ padding:10px; border-bottom:1px solid var(--border); }

.settings-row{ display:flex; align-items:center; justify-content:space-between; padding:15px 4px; border-bottom:1px solid var(--border); gap:14px; }
.settings-row:last-child{ border-bottom:none; }
.settings-row .srow-label{ font-weight:700; font-size:14px; }
.settings-row .srow-sub{ font-size:12px; color:var(--text-faint); margin-top:2px; }
.switch{ width:44px; height:26px; border-radius:20px; background:var(--surface-3); position:relative; cursor:pointer; border:1px solid var(--border); flex-shrink:0;}
.switch.on{ background:var(--mint); }
.switch::after{ content:''; position:absolute; width:20px; height:20px; border-radius:50%; background:#fff; top:2px; left:2px; transition: left .15s; }
.switch.on::after{ left:20px; background:#04140D; }

.filter-bar{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
.search-box{ display:flex; align-items:center; gap:8px; background:var(--surface-2); border:1px solid var(--border); border-radius:11px; padding:9px 13px; flex:1; min-width:160px;}
.search-box svg{ width:15px; height:15px; color:var(--text-faint); flex-shrink:0;}
.search-box input{ border:none; background:transparent; outline:none; color:var(--text); font-size:13.5px; width:100%; font-family:inherit;}

.masked{ filter: blur(7px); user-select:none; }

.hidden{ display:none !important; }
.spacer{ flex:1; }
.text-dim{ color:var(--text-dim); }
.text-faint{ color:var(--text-faint); }
.mb-0{margin-bottom:0;}

@media(max-width:860px){
  #sidebar{ display:none; }
  #topbar{ display:flex; }
  main#content{ padding:18px 16px 100px; }
  .hero-amount{ font-size:34px; }
}
</style>
</head>
<body data-fontsize="md">

<div id="lockscreen" class="hidden"></div>

<div id="drawer-overlay"></div>
<div id="drawer"></div>

<div id="app-shell">
  <aside id="sidebar"></aside>
  <div style="flex:1; min-width:0; display:flex; flex-direction:column;">
    <div id="topbar"></div>
    <main id="content"></main>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>
<div id="modal-root"></div>

/* ====================== INDEXEDDB LAYER ====================== */
const DB_NAME = 'UtilmintDB';
const DB_VERSION = 1;
let _db = null;

function openDB(){
  return new Promise((resolve, reject)=>{
    if(_db){ resolve(_db); return; }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e)=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains('transactions')){
        const s = db.createObjectStore('transactions', {keyPath:'id', autoIncrement:true});
        s.createIndex('date','date'); s.createIndex('walletId','walletId'); s.createIndex('type','type');
      }
      if(!db.objectStoreNames.contains('wallets')){
        db.createObjectStore('wallets', {keyPath:'id', autoIncrement:true});
      }
      if(!db.objectStoreNames.contains('budgets')){
        db.createObjectStore('budgets', {keyPath:'id', autoIncrement:true});
      }
      if(!db.objectStoreNames.contains('goals')){
        db.createObjectStore('goals', {keyPath:'id', autoIncrement:true});
      }
      if(!db.objectStoreNames.contains('settings')){
        db.createObjectStore('settings', {keyPath:'key'});
      }
    };
    req.onsuccess = (e)=>{ _db = e.target.result; resolve(_db); };
    req.onerror = (e)=>{ reject(e.target.error); };
  });
}
function tx(storeNames, mode='readonly'){
  return openDB().then(db=> db.transaction(storeNames, mode));
}
function dbGetAll(store){
  return tx([store]).then(t=> new Promise((res,rej)=>{
    const r = t.objectStore(store).getAll();
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  }));
}
function dbGet(store, key){
  return tx([store]).then(t=> new Promise((res,rej)=>{
    const r = t.objectStore(store).get(key);
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  }));
}
function dbAdd(store, obj){
  return tx([store],'readwrite').then(t=> new Promise((res,rej)=>{
    const r = t.objectStore(store).add(obj);
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  }));
}
function dbPut(store, obj){
  return tx([store],'readwrite').then(t=> new Promise((res,rej)=>{
    const r = t.objectStore(store).put(obj);
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  }));
}
function dbDelete(store, key){
  return tx([store],'readwrite').then(t=> new Promise((res,rej)=>{
    const r = t.objectStore(store).delete(key);
    r.onsuccess=()=>res(true); r.onerror=()=>rej(r.error);
  }));
}
function dbClear(store){
  return tx([store],'readwrite').then(t=> new Promise((res,rej)=>{
    const r = t.objectStore(store).clear();
    r.onsuccess=()=>res(true); r.onerror=()=>rej(r.error);
  }));
}

async function getSettings(){
  let s = await dbGet('settings','app');
  if(!s){ s = {...DEFAULT_SETTINGS}; await dbPut('settings', s); }
  return s;
}
async function saveSettings(patch){
  const s = await getSettings();
  const updated = {...s, ...patch};
  await dbPut('settings', updated);
  STATE.settings = updated;
  return updated;
}

  const wallets = await dbGetAll('wallets');
  if(wallets.length===0){
    const id = await dbAdd('wallets', {name:'Primary Wallet', icon:'wallet', createdAt: Date.now()});
    await saveSettings({activeWalletId:id});
    return id;
  }
  return wallets[0].id;
}

function fmtMoney(amount, {mask=null}={}){
  const cur = CURRENCIES[STATE.settings?.currency || 'INR'];
  const hide = mask===null ? (STATE.settings?.hideBalance) : mask;
  if(hide) return cur.symbol + ' ••••';
  const n = Number(amount)||0;
  const abs = Math.abs(n);
  const str = abs.toLocaleString(cur.locale, {minimumFractionDigits: abs%1===0?0:2, maximumFractionDigits:2});
  return (n<0?'-':'') + cur.symbol + str;
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
}
function fmtDateShort(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', {day:'numeric', month:'short'});
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function monthKey(iso){ return iso.slice(0,7); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function activeWalletTxns(){
  const wid = STATE.settings.activeWalletId;
  if(!wid || wid==='all') return STATE.transactions;
  return STATE.transactions.filter(t=>t.walletId===wid);
}
function computeTotals(txns){
  let income=0, expense=0;
  txns.forEach(t=>{ if(t.type==='income') income+=t.amount; else expense+=t.amount; });
  return {income, expense, balance: income-expense, savings: income-expense};
}
function thisMonthTxns(txns){
  const mk = monthKey(todayISO());
  return txns.filter(t=>monthKey(t.date)===mk);
}

function toast(msg, {type='info', action=null, duration=3200}={}){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast '+type;
  const icon = type==='success'?'check':type==='error'?'alert':'bell';
  el.innerHTML = `${ic(icon)}<span>${esc(msg)}</span>` + (action? `<span class="toast-action" data-toast-action="1">${esc(action.label)}</span>`:'');
  wrap.appendChild(el);
  if(action){
    el.querySelector('[data-toast-action]').addEventListener('click', ()=>{ action.onClick(); el.remove(); });
  }
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .25s'; setTimeout(()=>el.remove(),260); }, duration);
}

async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

    <div style="color:var(--mint)" class="lock-leaf">${ic('logo')}</div>
    <h2 id="lock-title">${titleMap[mode]}</h2>
    <div class="pin-dots" id="pin-dots">${pinDotsHTML(0,false)}</div>
    <div class="keypad" id="keypad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button data-key="${n}">${n}</button>`).join('')}
      <button class="ghost" data-key="bio">${canBio?ic('fingerprint'):''}</button>
      <button data-key="0">0</button>
      <button class="ghost" data-key="back">${ic('chevronLeft')}</button>
    </div>
    ${mode==='unlock'? `<button class="btn btn-ghost" id="forgot-pin-btn">Forgot PIN? Reset app data</button>`:''}
  `;
  lock.querySelectorAll('[data-key]').forEach(btn=>{
    btn.addEventListener('click', ()=> handlePinKey(btn.dataset.key));
  });
  if(mode==='unlock'){
    document.getElementById('forgot-pin-btn').addEventListener('click', async ()=>{
      if(confirm('This will permanently erase all Utilmint data on this device. Continue?')){
        await resetAllData();
        location.reload();
      }
    });
  }
  if(canBio) tryWebAuthnUnlock(true);
}
async function handlePinKey(key){
  if(key==='back'){ STATE.pinBuffer = STATE.pinBuffer.slice(0,-1); updatePinDots(); return; }
  if(key==='bio'){ tryWebAuthnUnlock(false); return; }
  if(STATE.pinBuffer.length>=4) return;
  STATE.pinBuffer += key;
  updatePinDots();
  if(STATE.pinBuffer.length===4){
    await handlePinComplete();
  }
}
function updatePinDots(err){
  document.getElementById('pin-dots').innerHTML = pinDotsHTML(STATE.pinBuffer.length, err);
}
async function handlePinComplete(){
  const entered = STATE.pinBuffer;
  if(STATE.pinMode==='unlock'){
    const hash = await sha256(entered);
    if(hash === STATE.settings.pinHash){
      unlockApp();
    } else {
      updatePinDots(true);
      toast('Incorrect PIN', {type:'error'});
      setTimeout(()=>{ STATE.pinBuffer=''; updatePinDots(false); }, 450);
    }
  } else if(STATE.pinMode==='setup'){
    STATE.pinFirstEntry = entered;
    renderLockscreen('confirm');
  } else if(STATE.pinMode==='confirm'){
    if(entered === STATE.pinFirstEntry){
      const hash = await sha256(entered);
      await saveSettings({pinEnabled:true, pinHash:hash});
      toast('PIN set successfully', {type:'success'});
      document.getElementById('lockscreen').classList.add('hidden');
      render();
    } else {
      toast("PINs didn't match, try again", {type:'error'});
      renderLockscreen('setup');
    }
  }
}
function unlockApp(){
  STATE.unlocked = true;
  document.getElementById('lockscreen').classList.add('hidden');
  render();
}
async function tryWebAuthnUnlock(silent){
  if(!STATE.settings.webauthnCredId || !window.PublicKeyCredential) return;
  try{
    const credIdBytes = Uint8Array.from(atob(STATE.settings.webauthnCredId), c=>c.charCodeAt(0));
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({
      publicKey:{ challenge, allowCredentials:[{id:credIdBytes, type:'public-key'}], userVerification:'required', timeout:30000 }
    });
    unlockApp();
  }catch(e){
    if(!silent) toast('Biometric unlock unavailable or cancelled', {type:'error'});
  }
}
async function setupWebAuthn(){
  if(!window.PublicKeyCredential){ toast('Biometric auth not supported on this device', {type:'error'}); return; }
  try{
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userId = crypto.getRandomValues(new Uint8Array(16));
    const cred = await navigator.credentials.create({
      publicKey:{
        challenge, rp:{name:'Utilmint'},
        user:{ id:userId, name:'utilmint-user', displayName:'Utilmint User' },
        pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
        authenticatorSelection:{ userVerification:'required' },
        timeout:30000,
      }
    });
    const credId = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
    await saveSettings({webauthnCredId: credId});
    toast('Biometric unlock enabled', {type:'success'});
    render();
  }catch(e){
    toast('Could not set up biometric unlock', {type:'error'});
  }
}
async function resetAllData(){
  await dbClear('transactions'); await dbClear('wallets'); await dbClear('budgets');
  await dbClear('goals'); await dbClear('settings');
}

/* ====================== ALERTS ENGINE ====================== */
function computeAlerts(){
  const alerts = [];
  const txns = activeWalletTxns();
  const {balance} = computeTotals(txns);
  if(balance < STATE.settings.lowBalanceThreshold){
    alerts.push({type:'danger', icon:'alert', text:`Low balance: ${fmtMoney(balance)} remaining.`});
  }
  const mk = monthKey(todayISO());
  STATE.budgets.forEach(b=>{
    const spent = txns.filter(t=>t.type==='expense' && t.category===b.category && monthKey(t.date)===mk)
      .reduce((s,t)=>s+t.amount,0);
    if(spent > b.amount){
      alerts.push({type:'danger', icon:'alert', text:`Over budget on ${catInfo('expense',b.category).label}: ${fmtMoney(spent)} / ${fmtMoney(b.amount)}.`});
    } else if(spent > b.amount*0.85){
      alerts.push({type:'warn', icon:'alert', text:`Nearing budget limit on ${catInfo('expense',b.category).label}.`});
    }
  });
  STATE.goals.forEach(g=>{
    if(!g.completed && g.saved>=g.target){
      alerts.push({type:'mint', icon:'trophy', text:`Goal "${g.name}" completed! 🎉`});
    }
  });
  return alerts;
}
function alertsHTML(){
  const alerts = computeAlerts();
  if(alerts.length===0) return '';
  return alerts.slice(0,4).map(a=>`<div class="alert-banner alert-${a.type}">${ic(a.icon)}<span>${esc(a.text)}</span></div>`).join('');
}

/* ====================== SPARKLINE ====================== */
function sparklineSVG(values, color){
  if(values.length<2) return `<div class="text-faint" style="font-size:11.5px;">Not enough data yet</div>`;
  const w=320,h=46, max=Math.max(...values), min=Math.min(...values), range=(max-min)||1;
  const pts = values.map((v,i)=>{
    const x = (i/(values.length-1))*w;
    const y = h - ((v-min)/range)*h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const areaPts = `0,${h} ${pts.join(' ')} ${w},${h}`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:100%;">
    <polyline points="${areaPts}" fill="${color}" opacity="0.12" stroke="none"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}
function last30DaysBalanceSeries(txns){
  const days = 14;
  const now = new Date();
  const series = [];
  const sorted = [...txns].sort((a,b)=>a.date.localeCompare(b.date));
  for(let i=days-1;i>=0;i--){
    const d = new Date(now); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    const upTo = sorted.filter(t=>t.date<=iso);
    const {balance} = computeTotals(upTo);
    series.push(balance);
  }
  return series;
}

async function generateRecurringInstances(base){
  // Generate the next 3 future instances locally (client-side only, no server)
  const count = 3;
  const step = base.recurring==='weekly'? 7 : 30;
  let d = new Date(base.date);
  for(let i=0;i<count;i++){
    d = new Date(d); d.setDate(d.getDate()+step);
    const rec = {...base, id:undefined, date:d.toISOString().slice(0,10), createdAt:Date.now(), recurring:'none', note:(base.note?base.note+' ':'')+'(auto-generated)'};
    await dbAdd('transactions', rec);
  }
}
async function deleteTransaction(id){
  const obj = STATE.transactions.find(t=>t.id===id);
  if(!obj) return;
  await dbDelete('transactions', id);
  STATE.lastDeleted = {store:'transactions', obj};
  await loadAll();
  render();
  toast('Transaction deleted', {type:'info', action:{label:'UNDO', onClick: undoDelete}});
}
async function undoDelete(){
  if(!STATE.lastDeleted) return;
  const {store, obj} = STATE.lastDeleted;
  const copy = {...obj};
  await dbAdd(store, copy);
  STATE.lastDeleted = null;
  await loadAll();
  render();
  toast('Restored', {type:'success'});
}
async function duplicateTransaction(id){
  const obj = STATE.transactions.find(t=>t.id===id);
  if(!obj) return;
  const copy = {...obj, id:undefined, date: todayISO(), createdAt: Date.now()};
  await dbAdd('transactions', copy);
  await loadAll(); render();
  toast('Transaction duplicated', {type:'success'});
}

/* ====================== ANALYTICS ====================== */
function donutSVG(income, expense){
  const total = income+expense;
  const incPct = total? (income/total)*100 : 0;
  const bg = `conic-gradient(var(--mint) 0% ${incPct}%, var(--red) ${incPct}% 100%)`;
  return `<div style="width:150px; height:150px; border-radius:50%; background:${total?bg:'var(--surface-3)'}; margin:0 auto; position:relative; flex-shrink:0;">
    <div style="position:absolute; inset:14px; border-radius:50%; background:var(--surface); display:flex; align-items:center; justify-content:center; flex-direction:column;">
      <div style="font-family:var(--font-display); font-weight:700; font-size:17px;">${total?Math.round(incPct):0}%</div>
      <div class="text-faint" style="font-size:10px;">Income</div>
    </div>
  </div>`;
}
function barsSVG(labels, values, color){
  const w = 560, h = 180, pad=28, bw = (w-pad*2)/labels.length*0.6, gap=(w-pad*2)/labels.length;
  const max = Math.max(...values, 1);
  let bars = '', labelsHTML='';
  values.forEach((v,i)=>{
    const bh = (v/max)*(h-40);
    const x = pad + i*gap + (gap-bw)/2;
    const y = h-30-bh;
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="4" fill="${color}"/>`;
    bars += `<text x="${(x+bw/2).toFixed(1)}" y="${(y-6).toFixed(1)}" font-size="10.5" fill="var(--text-faint)" text-anchor="middle" font-family="JetBrains Mono, monospace">${v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)}</text>`;
    labelsHTML += `<text x="${(x+bw/2).toFixed(1)}" y="${h-10}" font-size="11" fill="var(--text-dim)" text-anchor="middle">${esc(labels[i])}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto;">${bars}${labelsHTML}</svg>`;
}
function categoryBreakdown(txns, type){
  const list = type==='income'?INC_CATEGORIES:EXP_CATEGORIES;
  const sums = {};
  txns.filter(t=>t.type===type).forEach(t=> sums[t.category]=(sums[t.category]||0)+t.amount);
  const total = Object.values(sums).reduce((a,b)=>a+b,0);
  const entries = Object.entries(sums).sort((a,b)=>b[1]-a[1]);
  if(entries.length===0) return emptyState('chart','No data yet', `Add ${type} transactions to see the breakdown.`);
  return entries.map(([k,v])=>{
    const c = catInfo(type,k);
    const pct = total? (v/total*100):0;
    return `<div style="margin-bottom:12px;">
      <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px;">
        <span style="font-weight:700; display:flex; align-items:center; gap:7px;"><span style="width:9px; height:9px; border-radius:3px; background:${c.color}; display:inline-block;"></span>${esc(c.label)}</span>
        <span class="text-dim">${fmtMoney(v)} · ${pct.toFixed(0)}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%; background:${c.color};"></div></div>
    </div>`;
  }).join('');
}
function lastNMonths(n){
  const arr=[]; const d = new Date();
  for(let i=n-1;i>=0;i--){ const m = new Date(d.getFullYear(), d.getMonth()-i, 1); arr.push(m); }
  return arr;
}

/* ====================== REPORTS ====================== */
function toCSV(txns){
  const header = ['Date','Type','Category','Wallet','Amount','Note','Favorite','Recurring'];
  const rows = txns.map(t=>{
    const wallet = STATE.wallets.find(w=>w.id===t.walletId);
    return [t.date, t.type, catInfo(t.type,t.category).label, wallet?wallet.name:'', t.amount, (t.note||'').replace(/,/g,';'), t.favorite?'Yes':'No', t.recurring];
  });
  return [header, ...rows].map(r=>r.join(',')).join('\n');
}
function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
async function exportCSV(){
  const txns = [...STATE.transactions].sort((a,b)=>a.date.localeCompare(b.date));
  if(txns.length===0){ toast('No transactions to export', {type:'error'}); return; }
  downloadFile(`utilmint-transactions-${todayISO()}.csv`, toCSV(txns), 'text/csv');
  toast('CSV exported', {type:'success'});
}
async function exportJSON(){
  const dump = { transactions: STATE.transactions, wallets: STATE.wallets, budgets: STATE.budgets, goals: STATE.goals, settings: STATE.settings, exportedAt: new Date().toISOString(), version: DB_VERSION };
  downloadFile(`utilmint-backup-${todayISO()}.json`, JSON.stringify(dump,null,2), 'application/json');
  toast('Backup exported', {type:'success'});
}

  if(navigator.share){
    try{ await navigator.share({title:'Utilmint Summary', text}); }catch(e){}

}
function monthlySummaryHTML(){
  const txns = activeWalletTxns();
  const mTxns = thisMonthTxns(txns);
  const {income, expense, balance} = computeTotals(mTxns);
  const monthName = new Date().toLocaleDateString('en-IN',{month:'long', year:'numeric'});
  const topCat = (()=>{
    const sums={}; mTxns.filter(t=>t.type==='expense').forEach(t=>sums[t.category]=(sums[t.category]||0)+t.amount);
    const entries = Object.entries(sums).sort((a,b)=>b[1]-a[1]);
    return entries[0] ? catInfo('expense', entries[0][0]).label + ' — ' + fmtMoney(entries[0][1]) : '—';
  })();
  return `
    <div class="card" style="margin-bottom:16px;">
      <h3 style="margin-bottom:14px;">${esc(monthName)} Summary</h3>
      <div class="grid grid-2">
        <div><div class="text-faint" style="font-size:11.5px;">Income</div><div style="font-weight:700; font-size:17px; color:var(--mint);">${fmtMoney(income)}</div></div>
        <div><div class="text-faint" style="font-size:11.5px;">Expenses</div><div style="font-weight:700; font-size:17px; color:var(--red);">${fmtMoney(expense)}</div></div>
        <div><div class="text-faint" style="font-size:11.5px;">Net</div><div style="font-weight:700; font-size:17px;">${fmtMoney(income-expense)}</div></div>
        <div><div class="text-faint" style="font-size:11.5px;">Top Category</div><div style="font-weight:700; font-size:13px; margin-top:2px;">${esc(topCat)}</div></div>
      </div>
    </div>`;
}
function renderReports(){
  return `
    <div class="page-head"><div><div class="eyebrow">Export & Share</div><h1>Reports</h1></div></div>
    ${monthlySummaryHTML()}
    <div class="grid grid-2">
      <div class="card hoverable" id="rep-csv"><div class="stat-icon" style="background:var(--mint-glow); color:var(--mint); margin-bottom:10px;">${ic('download')}</div><div style="font-weight:700; font-size:14px;">Export CSV</div><div class="text-faint" style="font-size:12px; margin-top:3px;">All transactions as spreadsheet</div></div>
      <div class="card hoverable" id="rep-json"><div class="stat-icon" style="background:rgba(176,140,255,0.15); color:#B08CFF; margin-bottom:10px;">${ic('file')}</div><div style="font-weight:700; font-size:14px;">Export Full Backup</div><div class="text-faint" style="font-size:12px; margin-top:3px;">Complete JSON snapshot of the app</div></div>
      <div class="card hoverable" id="rep-share"><div class="stat-icon" style="background:var(--amber-dim); color:var(--amber); margin-bottom:10px;">${ic('share')}</div><div style="font-weight:700; font-size:14px;">Share Summary</div><div class="text-faint" style="font-size:12px; margin-top:3px;">Send this month's summary</div></div>
      <div class="card hoverable" id="rep-restore"><div class="stat-icon" style="background:var(--surface-3); color:var(--text-dim); margin-bottom:10px;">${ic('upload')}</div><div style="font-weight:700; font-size:14px;">Restore Backup</div><div class="text-faint" style="font-size:12px; margin-top:3px;">Import a previously exported JSON file</div></div>
    </div>
    <input type="file" id="restore-file-input" accept="application/json" class="hidden">
  `;
}
async function restoreFromFile(file){
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!data.transactions || !data.wallets){ toast('Invalid backup file', {type:'error'}); return; }
    if(!confirm('Restoring will replace all current data. Continue?')) return;
    await dbClear('transactions'); await dbClear('wallets'); await dbClear('budgets'); await dbClear('goals');
    for(const w of data.wallets){ const id=w.id; delete w.id; const newId = await dbAdd('wallets', w); if(id!==undefined){} }
    // simplest reliable restore: put with original ids preserved
    await dbClear('wallets');
    for(const w of data.wallets) await dbPut('wallets', w);
    for(const t of data.transactions) await dbPut('transactions', t);
    for(const b of (data.budgets||[])) await dbPut('budgets', b);
    for(const g of (data.goals||[])) await dbPut('goals', g);
    if(data.settings){ const {key, ...rest} = data.settings; await saveSettings(rest); }
    await loadAll(); render();
    toast('Backup restored successfully', {type:'success'});
  }catch(e){
    toast('Failed to restore backup', {type:'error'});
  }
}

  renderLockscreen('setup');

/* ====================== ROUTER / MAIN RENDER ====================== */
function pageForRoute(route){
  const base = route.split('?')[0];
  if(base.startsWith('#/transactions')) return renderTransactions();
  if(base.startsWith('#/wallets')) return renderWallets();
  if(base.startsWith('#/analytics')) return renderAnalytics();
  if(base.startsWith('#/budget')) return renderBudget();
  if(base.startsWith('#/goals')) return renderGoals();
  if(base.startsWith('#/reports')) return renderReports();
  if(base.startsWith('#/settings')) return renderSettings();
  return renderDashboard();
}
function render(){
  if(!STATE.settings) return;
  if(STATE.settings.pinEnabled && !STATE.unlocked){
    renderLockscreen('unlock');
    return;
  }
  document.getElementById('lockscreen').classList.add('hidden');
  renderSidebar();
  renderTopbar();
  document.getElementById('content').innerHTML = pageForRoute(STATE.route);
  bindPageEvents();
}

/* ====================== EVENT DELEGATION ====================== */
document.addEventListener('click', async (e)=>{
  const navEl = e.target.closest('[data-nav]');
  if(navEl){ closeDrawer(); navigate(navEl.dataset.nav); return; }
  const actionEl = e.target.closest('[data-action]');
  if(actionEl){
    const a = actionEl.dataset.action;
    if(a==='open-drawer'){ openDrawer(); return; }
    if(a==='close-modal'){ closeModal(); return; }
    if(a==='toggle-theme'){ await saveSettings({theme: STATE.settings.theme==='dark'?'light':'dark'}); applyTheme(); render(); return; }
    if(a==='toggle-hide-balance'){ await saveSettings({hideBalance: !STATE.settings.hideBalance}); render(); return; }
    if(a==='new-income'){ openTxnForm({type:'income'}); return; }
    if(a==='new-expense'){ openTxnForm({type:'expense'}); return; }
    if(a==='open-breakdown'){ navigate('#/transactions'); return; }
  }
  const openTxn = e.target.closest('[data-open-txn]');
  if(openTxn){ openTxnDetail(Number(openTxn.dataset.openTxn)); return; }
});

function bindPageEvents(){
  const content = document.getElementById('content');
  if(!content) return;

  // Transactions filters
  const search = content.querySelector('#txn-search');
  if(search){
    search.addEventListener('input', ()=>{ STATE.txnSearch = search.value; renderPartialTransactions(); });
  }
  content.querySelectorAll('[data-filter-type]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ STATE.txnFilterType = btn.dataset.filterType; navigate('#/transactions'); });
  });

  // Wallets
  content.querySelectorAll('[data-select-wallet]').forEach(el=>{
    el.addEventListener('click', async (e)=>{
      if(e.target.closest('[data-rename-wallet],[data-delete-wallet]')) return;
      const val = el.dataset.selectWallet;
      await saveSettings({activeWalletId: val==='all'?'all':Number(val)});
      render();
    });
  });
  content.querySelectorAll('[data-rename-wallet]').forEach(el=> el.addEventListener('click',(e)=>{ e.stopPropagation(); openWalletForm(Number(el.dataset.renameWallet)); }));
  content.querySelectorAll('[data-delete-wallet]').forEach(el=> el.addEventListener('click',(e)=>{ e.stopPropagation(); deleteWallet(Number(el.dataset.deleteWallet)); }));
  const newWalletBtn = content.querySelector('#new-wallet-btn');
  if(newWalletBtn) newWalletBtn.addEventListener('click', ()=>openWalletForm());

  // Budget
  const newBudgetBtn = content.querySelector('#new-budget-btn');
  if(newBudgetBtn) newBudgetBtn.addEventListener('click', ()=>openBudgetForm());
  content.querySelectorAll('[data-edit-budget]').forEach(el=> el.addEventListener('click', ()=>openBudgetForm(Number(el.dataset.editBudget))));
  content.querySelectorAll('[data-delete-budget]').forEach(el=> el.addEventListener('click', ()=>deleteBudget(Number(el.dataset.deleteBudget))));

  // Goals
  const newGoalBtn = content.querySelector('#new-goal-btn');
  if(newGoalBtn) newGoalBtn.addEventListener('click', ()=>openGoalForm());
  content.querySelectorAll('[data-add-goal-funds]').forEach(el=> el.addEventListener('click', ()=>openAddGoalFunds(Number(el.dataset.addGoalFunds))));
  content.querySelectorAll('[data-delete-goal]').forEach(el=> el.addEventListener('click', ()=>deleteGoal(Number(el.dataset.deleteGoal))));

  // Reports
  const repCsv = content.querySelector('#rep-csv'); if(repCsv) repCsv.addEventListener('click', exportCSV);
  const repJson = content.querySelector('#rep-json'); if(repJson) repJson.addEventListener('click', exportJSON);
  const repShare = content.querySelector('#rep-share'); if(repShare) repShare.addEventListener('click', shareSummary);
  const repRestore = content.querySelector('#rep-restore');
  const fileInput = content.querySelector('#restore-file-input');
  if(repRestore && fileInput){
    repRestore.addEventListener('click', ()=> fileInput.click());
    fileInput.addEventListener('change', ()=>{ if(fileInput.files[0]) restoreFromFile(fileInput.files[0]); });
  }

  // Settings
  const setCurrency = content.querySelector('#set-currency');
  if(setCurrency) setCurrency.addEventListener('change', async ()=>{ await saveSettings({currency:setCurrency.value}); render(); toast('Currency updated', {type:'success'}); });
  const setTheme = content.querySelector('#set-theme');
  if(setTheme) setTheme.addEventListener('click', async ()=>{ await saveSettings({theme: STATE.settings.theme==='dark'?'light':'dark'}); applyTheme(); render(); });
  content.querySelectorAll('[data-fontsize]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{ await saveSettings({fontSize:btn.dataset.fontsize}); applyTheme(); render(); });
  });
  const setHideBal = content.querySelector('#set-hide-balance');
  if(setHideBal) setHideBal.addEventListener('click', async ()=>{ await saveSettings({hideBalance: !STATE.settings.hideBalance}); render(); });
  const setLowBal = content.querySelector('#set-low-balance');
  if(setLowBal) setLowBal.addEventListener('change', async ()=>{ await saveSettings({lowBalanceThreshold: parseFloat(setLowBal.value)||0}); toast('Alert threshold updated', {type:'success'}); });
  const setPinToggle = content.querySelector('#set-pin-toggle');
  if(setPinToggle) setPinToggle.addEventListener('click', async ()=>{
    if(STATE.settings.pinEnabled){
      if(confirm('Turn off PIN lock?')){ await saveSettings({pinEnabled:false, pinHash:null}); STATE.unlocked=true; render(); toast('PIN lock disabled', {type:'info'}); }
    } else {
      renderLockscreen('setup');
    }
  });
  const setChangePin = content.querySelector('#set-change-pin');
  if(setChangePin) setChangePin.addEventListener('click', openChangePin);
  const setBio = content.querySelector('#set-biometric-toggle');
  if(setBio) setBio.addEventListener('click', async ()=>{
    if(STATE.settings.webauthnCredId){ await saveSettings({webauthnCredId:null}); render(); toast('Biometric unlock disabled', {type:'info'}); }
    else { await setupWebAuthn(); }
  });
  const setReset = content.querySelector('#set-reset');
  if(setReset) setReset.addEventListener('click', async ()=>{
    if(confirm('This will permanently erase all Utilmint data on this device. Continue?')){
      await resetAllData(); location.reload();
    }
  });
}
function renderPartialTransactions(){
  document.getElementById('content').innerHTML = pageForRoute(STATE.route);
  bindPageEvents();
  const search = document.getElementById('txn-search');
  if(search){ search.focus(); const v=search.value; search.value=''; search.value=v; }
}

/* ====================== INIT ====================== */
async function init(){
  await loadAll();
  await ensureDefaultWallet();
  STATE.settings = await getSettings();
  STATE.wallets = await dbGetAll('wallets');
  if(!STATE.settings.activeWalletId){ await saveSettings({activeWalletId: STATE.wallets[0]?.id}); }
  applyTheme();
  STATE.route = window.location.hash || '#/dashboard';
  if(!window.location.hash) window.location.hash = '#/dashboard';
  render();
}
init();
</script>
