<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Advanced Scientific Calculator</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b, #311042);
            --calc-bg: rgba(30, 41, 59, 0.7);
            --calc-border: rgba(255, 255, 255, 0.08);
            --display-bg: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --btn-basic: rgba(255, 255, 255, 0.06);
            --btn-basic-hover: rgba(255, 255, 255, 0.12);
            --btn-sci: rgba(147, 51, 234, 0.15);
            --btn-sci-hover: rgba(147, 51, 234, 0.25);
            --btn-op: rgba(249, 115, 22, 0.2);
            --btn-op-hover: rgba(249, 115, 22, 0.35);
            --btn-eq: linear-gradient(135deg, #ea580c, #d97706);
            --btn-eq-glow: rgba(234, 88, 12, 0.4);
            --accent: #a855f7;
            --glow: 0 0 15px rgba(168, 85, 247, 0.4);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .light-mode {
            --bg-gradient: linear-gradient(135deg, #f1f5f9, #e2e8f0, #cbd5e1);
            --calc-bg: rgba(255, 255, 255, 0.75);
            --calc-border: rgba(0, 0, 0, 0.08);
            --display-bg: rgba(248, 250, 252, 0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --btn-basic: rgba(0, 0, 0, 0.04);
            --btn-basic-hover: rgba(0, 0, 0, 0.08);
            --btn-sci: rgba(147, 51, 234, 0.08);
            --btn-sci-hover: rgba(147, 51, 234, 0.15);
            --btn-op: rgba(249, 115, 22, 0.12);
            --btn-op-hover: rgba(249, 115, 22, 0.22);
            --btn-eq: linear-gradient(135deg, #f97316, #ea580c);
            --btn-eq-glow: rgba(249, 115, 22, 0.3);
            --accent: #9333ea;
            --glow: 0 0 15px rgba(147, 51, 234, 0.2);
        }

        .no-animations * {
            animation: none !important;
            transition: none !important;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: var(--font);
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBg 20s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
            padding: 20px;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            display: flex;
            gap: 24px;
            max-width: 1280px;
            width: 100%;
            height: 860px;
            position: relative;
        }

        .calculator {
            flex: 1;
            background: var(--calc-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--calc-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .calculator:hover {
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.6), var(--glow);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid var(--calc-border);
        }

        .indicators {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .indicator-item {
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.2);
            transition: color 0.2s, background 0.2s;
        }

        .indicator-item.active {
            color: var(--text-main);
            background: var(--accent);
            text-shadow: 0 0 4px rgba(255,255,255,0.4);
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .win-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--btn-basic);
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }

        .win-btn:hover {
            background: var(--btn-basic-hover);
            transform: scale(1.05);
        }

        .display-container {
            padding: 24px;
            background: var(--display-bg);
            border-bottom: 1px solid var(--calc-border);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-end;
            min-height: 180px;
            position: relative;
            gap: 6px;
        }

        .expression-line {
            font-size: 1.25rem;
            color: var(--text-muted);
            min-height: 1.7rem;
            word-wrap: break-word;
            word-break: break-all;
            text-align: right;
            width: 100%;
            overflow-y: auto;
            max-height: 60px;
        }

        .preview-line {
            font-size: 1rem;
            color: var(--accent);
            min-height: 1.4rem;
            opacity: 0.8;
        }

        .result-line {
            font-size: 3rem;
            font-weight: 300;
            color: var(--text-main);
            width: 100%;
            text-align: right;
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            transition: transform 0.2s ease;
        }

        .result-line::-webkit-scrollbar {
            display: none;
        }

        .error-toast {
            position: absolute;
            bottom: 12px;
            left: 24px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            transform: translateY(20px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .error-toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .pad-tabs {
            display: flex;
            background: rgba(0,0,0,0.1);
            border-bottom: 1px solid var(--calc-border);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: rgba(255,255,255,0.02);
        }

        .pads-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .keyboard-pad {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            padding: 16px;
            gap: 10px;
            opacity: 0;
            transform: scale(0.96);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .keyboard-pad.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            z-index: 2;
        }

        .pad-scientific {
            grid-template-columns: repeat(6, 1fr);
        }

        .pad-basic {
            grid-template-columns: repeat(4, 1fr);
        }

        .pad-advanced {
            grid-template-columns: repeat(5, 1fr);
        }

        .btn {
            position: relative;
            border: 1px solid var(--calc-border);
            border-radius: 12px;
            font-family: var(--font);
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            background: var(--btn-basic);
        }

        .btn:hover {
            background: var(--btn-basic-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-sci-op {
            background: var(--btn-sci);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .btn-sci-op:hover {
            background: var(--btn-sci-hover);
        }

        .btn-math-op {
            background: var(--btn-op);
            color: #fdba74;
            font-size: 1.2rem;
        }

        .btn-math-op:hover {
            background: var(--btn-op-hover);
        }

        .btn-action {
            color: #f43f5e;
            font-weight: 600;
        }

        .btn-equal {
            background: var(--btn-eq);
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            grid-column: span 1;
        }

        .btn-equal:hover {
            box-shadow: 0 0 16px var(--btn-eq-glow);
            filter: brightness(1.1);
        }

        .pad-basic .btn-equal {
            grid-column: span 1;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.5s ease-out;
            background: rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .sidebar-panel {
            width: 340px;
            background: var(--calc-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--calc-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s, opacity 0.3s;
        }

        .sidebar-tabs {
            display: flex;
            background: rgba(0,0,0,0.1);
            border-bottom: 1px solid var(--calc-border);
        }

        .side-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            position: relative;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            background: rgba(0,0,0,0.15);
            border: 1px solid var(--calc-border);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s, transform 0.2s;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .history-item:hover {
            background: rgba(0,0,0,0.25);
        }

        .history-expr {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: right;
            word-wrap: break-word;
            margin-bottom: 4px;
        }

        .history-res {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            text-align: right;
        }

        .history-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .del-hist-btn {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .del-hist-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 40px;
            font-size: 0.95rem;
        }

        .settings-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.1);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--calc-border);
        }

        .setting-label {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .setting-control select, .setting-control input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--calc-border);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 6px;
            font-family: var(--font);
            outline: none;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.4);
            transition: .3s;
            border-radius: 24px;
            border: 1px solid var(--calc-border);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .clear-all-btn {
            width: 100%;
            padding: 10px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            margin-top: 12px;
        }

        .clear-all-btn:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .sidebar-toggle-floating {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: none;
        }

        @media (max-width: 1024px) {
            .app-container {
                height: 90vh;
                max-width: 650px;
            }
            .sidebar-panel {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 20;
                transform: translateX(105%);
            }
            .sidebar-panel.open {
                transform: translateX(0);
            }
            .sidebar-toggle-floating {
                display: block;
            }
        }

        @media (max-width: 640px) {
            body { padding: 8px; }
            .app-container { height: 100vh; gap: 0; }
            .calculator { border-radius: 16px; }
            .pad-scientific { grid-template-columns: repeat(5, 1fr); }
            .btn { font-size: 0.95rem; padding: 12px 4px; }
            .result-line { font-size: 2.25rem; }
            .top-bar { padding: 10px 16px; }
            .display-container { padding: 16px; min-height: 150px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <main class="calculator" role="application" aria-label="Advanced Scientific Calculator">
            <div class="top-bar">
                <div class="indicators">
                    <span id="ind-deg" class="indicator-item active">DEG</span>
                    <span id="ind-rad" class="indicator-item">RAD</span>
                    <span id="ind-grad" class="indicator-item">GRAD</span>
                    <span id="ind-mem" class="indicator-item">M</span>
                </div>
                <div class="window-controls">
                    <button class="win-btn" id="btn-toggle-side" title="Toggle History/Settings" aria-label="Toggle Side Panel">📋</button>
                </div>
            </div>

            <div class="display-container">
                <div class="expression-line" id="expr-display" aria-live="polite"></div>
                <div class="preview-line" id="preview-display"></div>
                <div class="result-line" id="res-display" role="textbox" aria-readonly="true">0</div>
                <div class="error-toast" id="error-box"></div>
            </div>

            <div class="pad-tabs" role="tablist">
                <button class="tab-btn active" role="tab" aria-selected="true" data-target="pad-basic">Basic</button>
                <button class="tab-btn" role="tab" aria-selected="false" data-target="pad-sci">Scientific</button>
                <button class="tab-btn" role="tab" aria-selected="false" data-target="pad-adv">Advanced & Memory</button>
            </div>

            <div class="pads-container">
                
                <div class="keyboard-pad pad-basic active" id="pad-basic">
                    <button class="btn btn-action" data-action="clear">AC</button>
                    <button class="btn btn-action" data-action="ce">CE</button>
                    <button class="btn btn-sci-op" data-token="(">(</button>
                    <button class="btn btn-sci-op" data-token=")">)</button>
                    
                    <button class="btn btn-sci-op" data-token="mod">mod</button>
                    <button class="btn btn-sci-op" data-token="pi">π</button>
                    <button class="btn btn-sci-op" data-token="e">e</button>
                    <button class="btn btn-math-op" data-token="/">÷</button>

                    <button class="btn" data-token="7">7</button>
                    <button class="btn" data-token="8">8</button>
                    <button class="btn" data-token="9">9</button>
                    <button class="btn btn-math-op" data-token="*">×</button>

                    <button class="btn" data-token="4">4</button>
                    <button class="btn" data-token="5">5</button>
                    <button class="btn" data-token="6">6</button>
                    <button class="btn btn-math-op" data-token="-">−</button>

                    <button class="btn" data-token="1">1</button>
                    <button class="btn" data-token="2">2</button>
                    <button class="btn" data-token="3">3</button>
                    <button class="btn btn-math-op" data-token="+">+</button>

                    <button class="btn" data-action="negate">±</button>
                    <button class="btn" data-token="0">0</button>
                    <button class="btn" data-token=".">.</button>
                    <button class="btn btn-equal" data-action="equals">=</button>
                </div>

                <div class="keyboard-pad pad-scientific" id="pad-sci">
                    <button class="btn btn-sci-op" data-token="sin(">sin</button>
                    <button class="btn btn-sci-op" data-token="cos(">cos</button>
                    <button class="btn btn-sci-op" data-token="tan(">tan</button>
                    <button class="btn btn-sci-op" data-token="asin(">asin</button>
                    <button class="btn btn-sci-op" data-token="acos(">acos</button>
                    <button class="btn btn-sci-op" data-token="atan(">atan</button>

                    <button class="btn btn-sci-op" data-token="sec(">sec</button>
                    <button class="btn btn-sci-op" data-token="cosec(">csc</button>
                    <button class="btn btn-sci-op" data-token="cot(">cot</button>
                    <button class="btn btn-sci-op" data-token="asec(">asec</button>
                    <button class="btn btn-sci-op" data-token="acosec(">acsc</button>
                    <button class="btn btn-sci-op" data-token="acot(">acot</button>

                    <button class="btn btn-sci-op" data-token="sinh(">sinh</button>
                    <button class="btn btn-sci-op" data-token="cosh(">cosh</button>
                    <button class="btn btn-sci-op" data-token="tanh(">tanh</button>
                    <button class="btn btn-sci-op" data-token="asinh(">asinh</button>
                    <button class="btn btn-sci-op" data-token="acosh(">acosh</button>
                    <button class="btn btn-sci-op" data-token="atanh(">atanh</button>

                    <button class="btn btn-sci-op" data-token="ln(">ln</button>
                    <button class="btn btn-sci-op" data-token="log10(">log₁₀</button>
                    <button class="btn btn-sci-op" data-token="log2(">log₂</button>
                    <button class="btn btn-sci-op" data-token="logbase(">logₐ(x)</button>
                    <button class="btn btn-sci-op" data-token="^2">x²</button>
                    <button class="btn btn-sci-op" data-token="^3">x³</button>

                    <button class="btn btn-sci-op" data-token="^">xʸ</button>
                    <button class="btn btn-sci-op" data-token="sqrt(">√</button>
                    <button class="btn btn-sci-op" data-token="cbrt(">∛</button>
                    <button class="btn btn-sci-op" data-token="root(">ⁿ√</button>
                    <button class="btn btn-sci-op" data-token="exp(">eˣ</button>
                    <button class="btn btn-sci-op" data-token="10^">10ˣ</button>

                    <button class="btn btn-sci-op" data-token="2^">2ˣ</button>
                    <button class="btn btn-sci-op" data-token="E">EXP</button>
                    <button class="btn btn-sci-op" data-token="!">x!</button>
                    <button class="btn btn-sci-op" data-token="abs(">abs</button>
                    <button class="btn btn-sci-op" data-token="1/">1/x</button>
                    <button class="btn btn-equal" data-action="equals">=</button>
                </div>

                <div class="keyboard-pad pad-advanced" id="pad-adv">
                    <button class="btn btn-sci-op" data-action="mem-clear">MC</button>
                    <button class="btn btn-sci-op" data-action="mem-recall">MR</button>
                    <button class="btn btn-sci-op" data-action="mem-store">MS</button>
                    <button class="btn btn-sci-op" data-action="mem-add">M+</button>
                    <button class="btn btn-sci-op" data-action="mem-sub">M-</button>

                    <button class="btn btn-sci-op" data-token="floor(">floor</button>
                    <button class="btn btn-sci-op" data-token="ceil(">ceil</button>
                    <button class="btn btn-sci-op" data-token="round(">round</button>
                    <button class="btn btn-sci-op" data-token="sign(">sign</button>
                    <button class="btn btn-sci-op" data-token="rand">rand</button>

                    <button class="btn btn-sci-op" data-action="to-fraction">▶Frac</button>
                    <button class="btn btn-sci-op" data-action="to-decimal">▶Dec</button>
                    <button class="btn btn-sci-op" data-action="undo">↰ Undo</button>
                    <button class="btn btn-sci-op" data-action="redo">↱ Redo</button>
                    <button class="btn btn-sci-op" data-token="ans">ANS</button>

                    <button class="btn btn-sci-op" data-action="copy">Copy</button>
                    <button class="btn btn-sci-op" data-action="paste">Paste</button>
                    <button class="btn btn-sci-op" data-action="scinot">SciNot</button>
                    <button class="btn btn-sci-op" data-action="engnot">EngNot</button>
                    <button class="btn btn-equal" data-action="equals">=</button>
                </div>

            </div>
        </main>

        <aside class="sidebar-panel" id="sidebar-panel">
            <div class="sidebar-tabs">
                <button class="tab-btn active" id="tab-history">History</button>
                <button class="tab-btn" id="tab-settings">Settings</button>
            </div>
            
            <div class="side-content" id="panel-history">
                <div class="history-list" id="history-container"></div>
                <button class="clear-all-btn" id="clear-history-btn">Clear All History</button>
            </div>

            <div class="side-content" id="panel-settings" style="display: none;">
                <div class="settings-grid">
                    <div class="setting-row">
                        <span class="setting-label">Theme</span>
                        <div class="setting-control">
                            <select id="setting-theme">
                                <option value="dark">Dark Slate</option>
                                <option value="light">Light Crisp</option>
                            </select>
                        </div>
                    </div>
                    <div class="setting-row">
                        <span class="setting-label">Angle Unit</span>
                        <div class="setting-control">
                            <select id="setting-angle">
                                <option value="deg">Degrees</option>
                                <option value="rad">Radians</option>
                                <option value="grad">Gradians</option>
                            </select>
                        </div>
                    </div>
                    <div class="setting-row">
                        <span class="setting-label">Sound Effects</span>
                        <div class="setting-control">
                            <label class="toggle-switch">
                                <input type="checkbox" id="setting-sound" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="setting-row">
                        <span class="setting-label">Animations</span>
                        <div class="setting-control">
                            <label class="toggle-switch">
                                <input type="checkbox" id="setting-anim" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="setting-row">
                        <span class="setting-label">Display Font Size</span>
                        <div class="setting-control">
                            <select id="setting-font">
                                <option value="normal">Normal</option>
                                <option value="large">Large</option>
                                <option value="huge">Huge</option>
                            </select>
                        </div>
                    </div>
                    <div class="setting-row">
                        <span class="setting-label">History Limit</span>
                        <div class="setting-control">
                            <input type="number" id="setting-hist-limit" min="5" max="100" value="30" style="width: 60px;">
                        </div>
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <script>
        // ==========================================
        // CONFIGURATION & STATE SYSTEM
        // ==========================================
        const State = {
            expression: "",
            lastResult: "0",
            ans: "0",
            memory: 0,
            angleMode: "deg", 
            history: [],
            undoStack: [""],
            redoStack: [],
            soundEnabled: true,
            animationsEnabled: true,
            theme: "dark",
            historyLimit: 30,
            fontSize: "normal"
        };

        // Audio generation for UI clicks
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClickSound() {
            if (!State.soundEnabled) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.06);
            } catch (e) {}
        }

        // ==========================================
        // MATHEMATICAL LEXER & PARSER ENGINE
        // ==========================================
        class MathEngine {
            static parse(str, angleMode = "deg", ans = "0") {
                let s = str.replace(/\s+/g, '')
                           .replace(/π/g, Math.PI.toString())
                           .replace(/\be\b/g, Math.E.toString())
                           .replace(/ans/gi, ans);
                
                // Implicit multiplication tokens handling
                s = s.replace(/(\d|\))(\(|sin|cos|tan|asin|acos|atan|sec|cosec|cot|sinh|cosh|tanh|asinh|acosh|atanh|ln|log10|log2|logbase|sqrt|cbrt|root|abs|floor|ceil|round|sign)/g, '$1*$2');
                s = s.replace(/(\))(\d)/g, '$1*$2');

                let pos = 0;

                function peek() { return s[pos]; }
                function consume(ch) { if (s[pos] === ch) { pos++; return true; } return false; }

                function parseExpression() {
                    let val = parseTerm();
                    while (true) {
                        if (consume('+')) val += parseTerm();
                        else if (consume('-')) val -= parseTerm();
                        else break;
                    }
                    return val;
                }

                function parseTerm() {
                    let val = parseFactor();
                    while (true) {
                        if (consume('*')) val *= parseFactor();
                        else if (consume('/')) {
                            let denom = parseFactor();
                            if (denom === 0) throw new Error("Division by zero");
                            val /= denom;
                        } else if (s.slice(pos, pos+3) === 'mod') {
                            pos += 3;
                            let denom = parseFactor();
                            val = val % denom;
                        } else break;
                    }
                    return val;
                }

                function parseFactor() {
                    let val = parsePrimary();
                    while (consume('^')) {
                        let exponent = parsePrimary();
                        val = Math.pow(val, exponent);
                    }
                    if (consume('!')) {
                        val = factorial(val);
                    }
                    return val;
                }

                function parsePrimary() {
                    if (consume('-')) return -parsePrimary();
                    if (consume('+')) return parsePrimary();

                    if (consume('(')) {
                        let val = parseExpression();
                        consume(')');
                        return val;
                    }

                    // Lookahead function parse
                    let funcMatch = s.slice(pos).match(/^[a-z0-9₀₁₂₃₄₅₆₇₈₉]+/i);
                    if (funcMatch) {
                        let fname = funcMatch[0];
                        pos += fname.length;
                        
                        if (fname === 'rand') return Math.random();

                        if (consume('(')) {
                            let args = [];
                            if (s[pos] !== ')') {
                                args.push(parseExpression());
                                while (consume(',')) {
                                    args.push(parseExpression());
                                }
                            }
                            consume(')');
                            return executeFunction(fname, args, angleMode);
                        }
                        throw new Error(`Missing open parenthesis after ${fname}`);
                    }

                    // Parse numeric literals including exponential notation
                    let numMatch = s.slice(pos).match(/^(\d+(\.\d*)?([eE][+-]?\d+)?)/);
                    if (numMatch) {
                        pos += numMatch[0].length;
                        return parseFloat(numMatch[0]);
                    }

                    throw new Error("Invalid Syntax");
                }

                function toRad(val, mode) {
                    if (mode === 'deg') return val * (Math.PI / 180);
                    if (mode === 'grad') return val * (Math.PI / 200);
                    return val;
                }

                function fromRad(val, mode) {
                    if (mode === 'deg') return val * (180 / Math.PI);
                    if (mode === 'grad') return val * (200 / Math.PI);
                    return val;
                }

                function factorial(n) {
                    if (n < 0 || !Number.isInteger(n)) throw new Error("Factorial error");
                    if (n > 170) throw new Error("Overflow");
                    let res = 1;
                    for (let i = 2; i <= n; i++) res *= i;
                    return res;
                }

                function executeFunction(name, args, mode) {
                    let a = args[0];
                    switch (name.toLowerCase()) {
                        case 'sin': return Math.sin(toRad(a, mode));
                        case 'cos': return Math.cos(toRad(a, mode));
                        case 'tan': return Math.tan(toRad(a, mode));
                        case 'sec': return 1 / Math.cos(toRad(a, mode));
                        case 'cosec': return 1 / Math.sin(toRad(a, mode));
                        case 'cot': return 1 / Math.tan(toRad(a, mode));
                        case 'asin': return fromRad(Math.asin(a), mode);
                        case 'acos': return fromRad(Math.acos(a), mode);
                        case 'atan': return fromRad(Math.atan(a), mode);
                        case 'asec': return fromRad(Math.acos(1 / a), mode);
                        case 'acosec': return fromRad(Math.asin(1 / a), mode);
                        case 'acot': return fromRad(Math.atan(1 / a), mode);
                        case 'sinh': return Math.sinh(a);
                        case 'cosh': return Math.cosh(a);
                        case 'tanh': return Math.tanh(a);
                        case 'asinh': return Math.asinh(a);
                        case 'acosh': if (a < 1) throw new Error("Invalid domain"); return Math.acosh(a);
                        case 'atanh': if (Math.abs(a) >= 1) throw new Error("Invalid domain"); return Math.atanh(a);
                        case 'ln': if (a <= 0) throw new Error("Invalid logarithm"); return Math.log(a);
                        case 'log10': if (a <= 0) throw new Error("Invalid logarithm"); return Math.log10(a);
                        case 'log2': if (a <= 0) throw new Error("Invalid logarithm"); return Math.log2(a);
                        case 'logbase': 
                            let base = args[1] !== undefined ? args[1] : 10;
                            if (a <= 0 || base <= 0 || base === 1) throw new Error("Log base error");
                            return Math.log(a) / Math.log(base);
                        case 'sqrt': if (a < 0) throw new Error("Negative root"); return Math.sqrt(a);
                        case 'cbrt': return Math.cbrt(a);
                        case 'root': 
                            let degree = args[1] !== undefined ? args[1] : 2;
                            if (degree === 0) throw new Error("Root degree zero");
                            if (a < 0 && degree % 2 === 0) throw new Error("Negative even root");
                            return a < 0 ? -Math.pow(-a, 1/degree) : Math.pow(a, 1/degree);
                        case 'exp': return Math.exp(a);
                        case 'abs': return Math.abs(a);
                        case 'floor': return Math.floor(a);
                        case 'ceil': return Math.ceil(a);
                        case 'round': return Math.round(a);
                        case 'sign': return Math.sign(a);
                        default: throw new Error("Unknown function");
                    }
                }

                let finalVal = parseExpression();
                if (pos < s.length) throw new Error("Invalid Syntax");
                if (isNaN(finalVal)) throw new Error("NaN Value");
                if (!isFinite(finalVal)) throw new Error("Overflow");
                return finalVal;
            }

            static toFraction(decimalStr) {
                let val = parseFloat(decimalStr);
                if (isNaN(val) || !isFinite(val)) return "Error";
                let sign = val < 0 ? "-" : "";
                val = Math.abs(val);
                let tolerance = 1.0e-9;
                let h1 = 1, h2 = 0, k1 = 0, k2 = 1;
                let b = val;
                do {
                    let a = Math.floor(b);
                    let aux = h1; h1 = a * h1 + h2; h2 = aux;
                    aux = k1; k1 = a * k1 + k2; k2 = aux;
                    b = 1 / (b - a);
                } while (Math.abs(val - h1 / k1) > val * tolerance);
                return `${sign}${h1}/${k1}`;
            }
        }

        // ==========================================
        // UI MANIPULATION & INTERACTION MODULE
        // ==========================================
        const DOMElements = {
            exprDisplay: document.getElementById('expr-display'),
            previewDisplay: document.getElementById('preview-display'),
            resDisplay: document.getElementById('res-display'),
            errorBox: document.getElementById('error-box'),
            sidebar: document.getElementById('sidebar-panel'),
            historyContainer: document.getElementById('history-container'),
            clearHistoryBtn: document.getElementById('clear-history-btn'),
            btnToggleSide: document.getElementById('btn-toggle-side'),
            tabHistory: document.getElementById('tab-history'),
            tabSettings: document.getElementById('tab-settings'),
            panelHistory: document.getElementById('panel-history'),
            panelSettings: document.getElementById('panel-settings'),
            indDeg: document.getElementById('ind-deg'),
            indRad: document.getElementById('ind-rad'),
            indGrad: document.getElementById('ind-grad'),
            indMem: document.getElementById('ind-mem'),
            // Settings DOM controls
            settingTheme: document.getElementById('setting-theme'),
            settingAngle: document.getElementById('setting-angle'),
            settingSound: document.getElementById('setting-sound'),
            settingAnim: document.getElementById('setting-anim'),
            settingFont: document.getElementById('setting-font'),
            settingHistLimit: document.getElementById('setting-hist-limit')
        };

        function initApp() {
            loadLocalStorage();
            applyTheme();
            applySettingsUI();
            updateIndicators();
            attachEventListeners();
            pushState();
        }

        function pushState() {
            if (State.undoStack[State.undoStack.length - 1] !== State.expression) {
                State.undoStack.push(State.expression);
                State.redoStack = []; // Reset Redo
            }
        }

        function updateDisplays() {
            DOMElements.exprDisplay.textContent = formatVisualExpression(State.expression);
            
            // Realtime Live Preview Calculation
            if (State.expression.trim() === "") {
                DOMElements.previewDisplay.textContent = "";
            } else {
                try {
                    let cleanExpr = autoCloseParentheses(State.expression);
                    let previewResult = MathEngine.parse(cleanExpr, State.angleMode, State.ans);
                    DOMElements.previewDisplay.textContent = "= " + formatNumberOutput(previewResult);
                } catch(e) {
                    DOMElements.previewDisplay.textContent = "";
                }
            }
        }

        function formatVisualExpression(expr) {
            return expr.replace(/\*/g, '×')
                       .replace(/\//g, '÷')
                       .replace(/log10\(/g, 'log₁₀(')
                       .replace(/log2\(/g, 'log₂(')
                       .replace(/logbase\(/g, 'logₐ(');
        }

        function autoCloseParentheses(expr) {
            let openCount = (expr.match(/\(/g) || []).length;
            let closeCount = (expr.match(/\)/g) || []).length;
            let missing = openCount - closeCount;
            if (missing > 0) {
                expr += ")".repeat(missing);
            }
            return expr;
        }

        function formatNumberOutput(num) {
            if (typeof num === 'string') return num;
            if (Math.abs(num) < 1e-12 && Math.abs(num) > 0) return "0";
            let s = num.toString();
            if (s.length > 14) {
                if (!Number.isInteger(num)) {
                    return Number(num.toPrecision(12)).toString();
                }
                return num.toExponential(8);
            }
            return s;
        }

        function displayError(msg) {
            DOMElements.errorBox.textContent = msg;
            DOMElements.errorBox.classList.add('show');
            setTimeout(() => {
                DOMElements.errorBox.classList.remove('show');
            }, 4000);
        }

        function triggerRipple(e, btn) {
            if (!State.animationsEnabled) return;
            const circle = document.createElement('span');
            const diameter = Math.max(btn.clientWidth, btn.clientHeight);
            const radius = diameter / 2;
            const rect = btn.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add('ripple');
            
            const prevRipple = btn.getElementsByClassName('ripple')[0];
            if (prevRipple) prevRipple.remove();
            btn.appendChild(circle);
        }

        // ==========================================
        // ACTION ROUTER & CONTROLLER
        // ==========================================
        function handleInputToken(token) {
            // Prevent duplicated floating dot indicators inside a single block
            if (token === '.') {
                let lastBlock = State.expression.split(/[\+\-\*\/]/).pop();
                if (lastBlock.includes('.')) return;
            }
            State.expression += token;
            updateDisplays();
            pushState();
        }

        function handleAction(action, event, button) {
            switch(action) {
                case 'clear':
                    State.expression = "";
                    DOMElements.resDisplay.textContent = "0";
                    updateDisplays();
                    pushState();
                    break;
                case 'ce':
                    if (State.expression.length > 0) {
                        // Check if backspacing a whole named function entity
                        let match = State.expression.match(/[a-z0-9₀₁₂₃₄₅₆₇₈₉]+\($/i);
                        if (match) {
                            State.expression = State.expression.slice(0, -match[0].length);
                        } else {
                            State.expression = State.expression.slice(0, -1);
                        }
                        updateDisplays();
                        pushState();
                    }
                    break;
                case 'negate':
                    if (State.expression === "" && State.lastResult !== "0") {
                        State.expression = (State.lastResult.startsWith('-')) ? State.lastResult.substring(1) : '-' + State.lastResult;
                    } else if (State.expression.startsWith('-')) {
                        State.expression = State.expression.substring(1);
                    } else {
                        State.expression = '-' + State.expression;
                    }
                    updateDisplays();
                    break;
                case 'equals':
                    processEvaluation();
                    break;
                case 'undo':
                    if (State.undoStack.length > 1) {
                        State.redoStack.push(State.undoStack.pop());
                        State.expression = State.undoStack[State.undoStack.length - 1];
                        updateDisplays();
                    }
                    break;
                case 'redo':
                    if (State.redoStack.length > 0) {
                        let popped = State.redoStack.pop();
                        State.expression = popped;
                        State.undoStack.push(popped);
                        updateDisplays();
                    }
                    break;
                case 'copy':
                    navigator.clipboard.writeText(DOMElements.resDisplay.textContent);
                    break;
                case 'paste':
                    navigator.clipboard.readText().then(text => {
                        if (/^[0-9\+\-\*\/\.\(\)\s]+$/.test(text)) {
                            State.expression += text.trim();
                            updateDisplays();
                            pushState();
                        }
                    }).catch(()=>{});
                    break;
                case 'to-fraction':
                    let frac = MathEngine.toFraction(DOMElements.resDisplay.textContent);
                    DOMElements.resDisplay.textContent = frac;
                    break;
                case 'to-decimal':
                    processEvaluation(); 
                    break;
                case 'scinot':
                    let numSci = parseFloat(State.lastResult);
                    if(!isNaN(numSci)) DOMElements.resDisplay.textContent = numSci.toExponential(5);
                    break;
                case 'engnot':
                    let numEng = parseFloat(State.lastResult);
                    if(!isNaN(numEng)) {
                        let exp = Math.floor(Math.log10(Math.abs(numEng)) / 3) * 3;
                        let mantissa = numEng / Math.pow(10, exp);
                        DOMElements.resDisplay.textContent = `${mantissa.toFixed(4)}e${exp}`;
                    }
                    break;
                // Memory Actions
                case 'mem-clear':
                    State.memory = 0;
                    updateIndicators();
                    break;
                case 'mem-recall':
                    State.expression += State.memory.toString();
                    updateDisplays();
                    pushState();
                    break;
                case 'mem-store':
                    State.memory = parseFloat(DOMElements.resDisplay.textContent) || 0;
                    updateIndicators();
                    break;
                case 'mem-add':
                    State.memory += parseFloat(DOMElements.resDisplay.textContent) || 0;
                    updateIndicators();
                    break;
                case 'mem-sub':
                    State.memory -= parseFloat(DOMElements.resDisplay.textContent) || 0;
                    updateIndicators();
                    break;
            }
        }

        function processEvaluation() {
            if (State.expression.trim() === "") return;
            try {
                let formula = autoCloseParentheses(State.expression);
                let finalVal = MathEngine.parse(formula, State.angleMode, State.ans);
                
                let outputStr = formatNumberOutput(finalVal);
                
                // Save history record
                addHistoryRecord(State.expression, outputStr);
                
                State.ans = outputStr;
                State.lastResult = outputStr;
                DOMElements.resDisplay.textContent = outputStr;
                State.expression = ""; 
                DOMElements.previewDisplay.textContent = "";
                pushState();
            } catch(err) {
                displayError(err.message || "Calculation Error");
            }
        }

        // ==========================================
        // SYSTEM CONTROLS & PERSISTENCE
        // ==========================================
        function addHistoryRecord(expr, res) {
            const item = {
                id: Date.now() + Math.random().toString(36).substr(2, 5),
                expr: expr,
                res: res,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };
            State.history.unshift(item);
            if (State.history.length > State.historyLimit) {
                State.history.pop();
            }
            renderHistoryList();
            saveLocalStorage();
        }

        function deleteHistoryItem(id, e) {
            e.stopPropagation();
            State.history = State.history.filter(x => x.id !== id);
            renderHistoryList();
            saveLocalStorage();
        }

        function renderHistoryList() {
            DOMElements.historyContainer.innerHTML = "";
            if (State.history.length === 0) {
                DOMElements.historyContainer.innerHTML = `<div class="empty-state">No history recorded yet.</div>`;
                return;
            }
            State.history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div class="history-expr">${formatVisualExpression(item.expr)}</div>
                    <div class="history-res">${item.res}</div>
                    <div class="history-meta">
                        <span>${item.time}</span>
                        <button class="del-hist-btn" data-id="${item.id}">Delete</button>
                    </div>
                `;
                div.addEventListener('click', () => {
                    State.expression = item.expr;
                    updateDisplays();
                    pushState();
                });
                div.querySelector('.del-hist-btn').addEventListener('click', (e) => deleteHistoryItem(item.id, e));
                DOMElements.historyContainer.appendChild(div);
            });
        }

        function updateIndicators() {
            DOMElements.indDeg.classList.toggle('active', State.angleMode === 'deg');
            DOMElements.indRad.classList.toggle('active', State.angleMode === 'rad');
            DOMElements.indGrad.classList.toggle('active', State.angleMode === 'grad');
            DOMElements.indMem.classList.toggle('active', State.memory !== 0);
        }

        function applyTheme() {
            if (State.theme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        }

        function applyAnimationsToggle() {
            if (!State.animationsEnabled) {
                document.body.classList.add('no-animations');
            } else {
                document.body.classList.remove('no-animations');
            }
        }

        function applyFontSize() {
            if (State.fontSize === 'large') {
                DOMElements.resDisplay.style.fontSize = "3.6rem";
            } else if (State.fontSize === 'huge') {
                DOMElements.resDisplay.style.fontSize = "4.2rem";
            } else {
                DOMElements.resDisplay.style.fontSize = "3rem";
            }
        }

        function applySettingsUI() {
            DOMElements.settingTheme.value = State.theme;
            DOMElements.settingAngle.value = State.angleMode;
            DOMElements.settingSound.checked = State.soundEnabled;
            DOMElements.settingAnim.checked = State.animationsEnabled;
            DOMElements.settingFont.value = State.fontSize;
            DOMElements.settingHistLimit.value = State.historyLimit;
            applyAnimationsToggle();
            applyFontSize();
        }

        function saveLocalStorage() {
            localStorage.setItem('sci_calc_state', JSON.stringify({
                history: State.history,
                theme: State.theme,
                angleMode: State.angleMode,
                soundEnabled: State.soundEnabled,
                animationsEnabled: State.animationsEnabled,
                fontSize: State.fontSize,
                historyLimit: State.historyLimit,
                memory: State.memory
            }));
        }

        function loadLocalStorage() {
            const data = localStorage.getItem('sci_calc_state');
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    State.history = parsed.history || [];
                    State.theme = parsed.theme || "dark";
                    State.angleMode = parsed.angleMode || "deg";
                    State.soundEnabled = parsed.soundEnabled !== false;
                    State.animationsEnabled = parsed.animationsEnabled !== false;
                    State.fontSize = parsed.fontSize || "normal";
                    State.historyLimit = parsed.historyLimit || 30;
                    State.memory = parsed.memory || 0;
                } catch(e) {}
            }
        }

        // ==========================================
        // EVENT ROUTING & BINDING SYSTEM
        // ==========================================
        function attachEventListeners() {
            // General keyboard button bindings
            document.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    playClickSound();
                    triggerRipple(e, btn);
                    
                    if (btn.dataset.token) {
                        handleInputToken(btn.dataset.token);
                    } else if (btn.dataset.action) {
                        handleAction(btn.dataset.action, e, btn);
                    }
                });
            });

            // Tab Panels Switching Controller
            document.querySelectorAll('.pad-tabs .tab-btn').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.pad-tabs .tab-btn').forEach(t => {
                        t.classList.remove('active');
                        t.setAttribute('aria-selected', 'false');
                    });
                    tab.classList.add('active');
                    tab.setAttribute('aria-selected', 'true');
                    
                    document.querySelectorAll('.keyboard-pad').forEach(pad => pad.classList.remove('active'));
                    document.getElementById(tab.dataset.target).classList.add('active');
                });
            });

            // Sidebar Right panel switcher controller
            DOMElements.tabHistory.addEventListener('click', () => {
                DOMElements.tabHistory.classList.add('active');
                DOMElements.tabSettings.classList.remove('active');
                DOMElements.panelHistory.style.display = "block";
                DOMElements.panelSettings.style.display = "none";
            });

            DOMElements.tabSettings.addEventListener('click', () => {
                DOMElements.tabSettings.classList.add('active');
                DOMElements.tabHistory.classList.remove('active');
                DOMElements.panelHistory.style.display = "none";
                DOMElements.panelSettings.style.display = "block";
            });

            DOMElements.btnToggleSide.addEventListener('click', () => {
                DOMElements.sidebar.classList.toggle('open');
            });

            DOMElements.clearHistoryBtn.addEventListener('click', () => {
                State.history = [];
                renderHistoryList();
                saveLocalStorage();
            });

            // Reactive Form Setting Updates
            DOMElements.settingTheme.addEventListener('change', (e) => {
                State.theme = e.target.value;
                applyTheme();
                saveLocalStorage();
            });
            DOMElements.settingAngle.addEventListener('change', (e) => {
                State.angleMode = e.target.value;
                updateIndicators();
                saveLocalStorage();
            });
            DOMElements.settingSound.addEventListener('change', (e) => {
                State.soundEnabled = e.target.checked;
                saveLocalStorage();
            });
            DOMElements.settingAnim.addEventListener('change', (e) => {
                State.animationsEnabled = e.target.checked;
                applyAnimationsToggle();
                saveLocalStorage();
            });
            DOMElements.settingFont.addEventListener('change', (e) => {
                State.fontSize = e.target.value;
                applyFontSize();
                saveLocalStorage();
            });
            DOMElements.settingHistLimit.addEventListener('change', (e) => {
                State.historyLimit = parseInt(e.target.value) || 30;
                saveLocalStorage();
            });

            // Physical Keyboard Listener integration
            document.addEventListener('keydown', (e) => {
                // Ignore matching inside form elements inputs
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

                if (e.key >= '0' && e.key <= '9') handleInputToken(e.key);
                else if (e.key === '.') handleInputToken('.');
                else if (e.key === '+') handleInputToken('+');
                else if (e.key === '-') handleInputToken('-');
                else if (e.key === '*') handleInputToken('*');
                else if (e.key === '/') handleInputToken('/');
                else if (e.key === '(') handleInputToken('(');
                else if (e.key === ')') handleInputToken(')');
                else if (e.key === '^') handleInputToken('^');
                else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); processEvaluation(); }
                else if (e.key === 'Backspace') handleAction('ce');
                else if (e.key === 'Escape') handleAction('clear');
                else if (e.ctrlKey && e.key.toLowerCase() === 'z') { e.preventDefault(); handleAction('undo'); }
                else if (e.ctrlKey && e.key.toLowerCase() === 'y') { e.preventDefault(); handleAction('redo'); }
            });
        }

        // Initialize execution setup
        window.addEventListener('DOMContentLoaded', () => {
            initApp();
            renderHistoryList();
        });
    </script>
</body>
</html>
